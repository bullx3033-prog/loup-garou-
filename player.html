<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لو ڨارو - لاعب</title>

  <link rel="stylesheet" href="style.css" />
  <style>
    .btn-suggest {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: auto;
      padding: 12px 20px;
      background: #2c2c2c;
      border: 1px solid crimson;
      border-radius: 30px;
      color: #fff;
      font-size: 14px;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
      z-index: 999;
      margin: 0;
    }
    .btn-suggest:hover {
      background: #3a3a3a;
      box-shadow: 0 0 30px crimson;
    }
    #roleBox .btn-group-vertical {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 15px;
    }
    #roleBox .btn-group-vertical .btn {
      width: 100%;
    }
    .role-image-wrapper {
      position: relative;
      width: 100%;
      max-width: 300px;
      margin: 10px auto;
    }
    .role-image-wrapper img.role-img {
      width: 100%;
      border-radius: 12px;
      border: 2px solid crimson;
    }
    .role-image-wrapper img.blood-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }
    .role-description {
      background: #1a1a1a;
      border: 1px solid #555;
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 10px;
      color: #ccc;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.3px;
    }
    .role-description strong {
      color: #d4a017;
    }

    .discord-player-section {
      background: #1a1a1a;
      border: 1px solid #5865F2;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
    }
    .discord-player-section .title {
      color: #5865F2;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .discord-player-section .link-box {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: #0d0d0d;
      padding: 10px;
      border-radius: 8px;
      margin-top: 8px;
      border: 1px solid #333;
    }
    .discord-player-section .link-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: #ccc;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      padding: 5px;
      min-width: 120px;
      direction: ltr;
    }
    .discord-player-section .link-box input:focus {
      outline: none;
    }
    .discord-player-section .btn-discord-join {
      background: #5865F2;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }
    .discord-player-section .btn-discord-join:hover {
      background: #4752C4;
      box-shadow: 0 0 15px #5865F2;
    }
