<!DOCTYPE html> 
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لو ڨارو - لاعب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .suggest-fab {
      position: fixed;
      top: 20px;
      z-index: 999;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #2c2c2c;
      border: 2px solid crimson;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.15);
      font-family: 'Cinzel', serif;
      touch-action: manipulation;
      user-select: none;
    }
    .suggest-fab:hover { background: #3a3a3a; transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 0, 0, 0.3); }
    .suggest-fab:active { transform: scale(0.95); }
    .suggest-fab { left: 20px; }
    [dir="ltr"] .suggest-fab { left: auto; right: 20px; }

    .btn-suggest-old { display: none !important; }

    .action-buttons-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .action-buttons-row .btn {
      flex: 0 1 auto;
      min-width: 50px;
      width: 54px;
      height: 48px;
      padding: 0;
      font-size: 20px;
      text-align: center;
      border-radius: 10px;
      border: none;
      font-family: 'Cinzel', serif;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .action-buttons-row .btn:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(255, 255, 255, 0.15); }
    .action-buttons-row .btn-hide { background: #2c2c2c; color: #fff; border: 1px solid #555; }
    .action-buttons-row .btn-hide:hover { background: #3a3a3a; border-color: #777; }
    .action-buttons-row .btn-suicide { background: #6b1a1a; color: #fff; border: 1px solid #8b0000; }
    .action-buttons-row .btn-suicide:hover { background: #8b0000; box-shadow: 0 0 20px #8b0000; }
    .action-buttons-row .btn-message { background: #b8860b; color: #fff; border: 1px solid #d4a017; }
    .action-buttons-row .btn-message:hover { background: #d4a017; box-shadow: 0 0 20px #d4a017; }
    .btn-show-card {
      width: 100%; padding: 10px; font-size: 16px; background: #2c2c2c; color: #fff;
      border: 1px solid #555; border-radius: 10px; cursor: pointer; transition: 0.3s; font-family: 'Cinzel', serif;
    }
    .btn-show-card:hover { background: #3a3a3a; box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }

    .role-image-wrapper { position: relative; width: 100%; max-width: 300px; margin: 10px auto; }
    .role-image-wrapper img.role-img { width: 100%; border-radius: 12px; border: 2px solid crimson; }
    .role-image-wrapper img.blood-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none;
    }
    .role-description {
      background: #1a1a1a; border: 1px solid #555; border-radius: 10px; padding: 10px 12px; margin-top: 10px;
      color: #ccc; font-size: 13px; line-height: 1.5; text-align: center; font-family: 'Cinzel', serif; letter-spacing: 0.3px;
    }
    .role-description strong { color: #d4a017; }

    .narrator-message-box {
      background: #2a1a0a; border: 2px solid #d4a017; border-radius: 10px; padding: 10px 14px; margin-top: 10px;
      display: none; animation: fadeIn 0.4s ease;
    }
    .narrator-message-box .msg-title { color: #d4a017; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .narrator-message-box .msg-text { color: #f0e0c0; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
    .narrator-message-box .msg-close {
      background: #6b1a1a; color: #fff; border: none; border-radius: 6px; padding: 2px 12px;
      font-family: 'Cinzel', serif; font-size: 12px; cursor: pointer; margin-top: 6px; transition: 0.3s;
    }
    .narrator-message-box .msg-close:hover { background: #8b0000; box-shadow: 0 0 15px #8b0000; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    #wolfChatContainer {
      margin-top: 15px;
      background: #0d0805;
      border: 2px solid #ff1a1a;
      border-radius: 12px;
      padding: 12px;
      display: none;
    }
    #wolfChatContainer .wolf-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    #wolfChatContainer .wolf-title span { color: #ff1a1a; font-size: 16px; font-weight: bold; }
    #wolfChatContainer .wolf-title small { color: #777; font-size: 11px; }
    #wolfMessagesList {
      max-height: 150px;
      overflow-y: auto;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
    }
    #wolfMessagesList .wolf-msg {
      padding: 4px 0;
      border-bottom: 1px solid #333;
      color: #ccc;
      font-size: 13px;
    }
    #wolfMessagesList .wolf-msg .wolf-name { color: #ff6b6b; font-weight: bold; }
    #wolfMessagesList .wolf-msg .wolf-time { color: #555; font-size: 10px; float: left; }
    .wolf-input-row { display: flex; gap: 8px; }
    .wolf-input-row input {
      flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #555;
      background: #111; color: #fff; font-family: 'Cinzel', serif; font-size: 13px;
    }
    .wolf-input-row input:focus { border-color: #ff1a1a; outline: none; }
    .wolf-input-row button {
      background: #ff1a1a; color: #fff; border: none; border-radius: 8px;
      padding: 8px 16px; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer;
      transition: 0.3s;
    }
    .wolf-input-row button:hover { background: #cc0000; box-shadow: 0 0 15px #ff1a1a; }
    .wolf-vote-btn {
      margin-top: 8px; width: 100%; background: #8b0000; color: #fff; border: none;
      border-radius: 8px; padding: 8px; font-family: 'Cinzel', serif; font-weight: bold;
      cursor: pointer; transition: 0.3s;
    }
    .wolf-vote-btn:hover { background: #aa0000; box-shadow: 0 0 20px #8b0000; }

    .discord-player-section {
      background: #1a1a1a; border: 1px solid #5865F2; border-radius: 12px; padding: 15px; margin-top: 15px;
    }
    .discord-player-section .title { color: #5865F2; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .discord-player-section .link-box {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: #0d0d0d;
      padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #333;
    }
    .discord-player-section .link-box input {
      flex: 1; background: transparent; border: none; color: #ccc; font-family: 'Cinzel', serif;
      font-size: 13px; padding: 5px; min-width: 120px; direction: ltr;
    }
    .discord-player-section .link-box input:focus { outline: none; }
    .discord-player-section .btn-discord-join {
      background: #5865F2; color: #fff; border: none; padding: 8px 16px; border-radius: 8px;
      font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px;
    }
    .discord-player-section .btn-discord-join:hover { background: #4752C4; box-shadow: 0 0 15px #5865F2; }

    .btn-secondary { background: #2c2c2c; color: #fff; border: 1px solid #555; }
    .btn-secondary:hover { background: #3a3a3a; border-color: #777; }
    .join-form-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .join-form-buttons .btn { flex: 1; min-width: 100px; }

    .modal-message .modal-content { max-width: 400px; }
    .modal-message textarea {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #555;
      background: #1a1a1a; color: #fff; font-family: 'Cinzel', serif; font-size: 14px;
      resize: vertical; min-height: 80px;
    }
    .modal-message textarea:focus { border-color: #d4a017; outline: none; box-shadow: 0 0 15px rgba(212, 160, 23, 0.2); }

    .role-name-infected {
      color: #2ecc71 !important;
      text-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
    }
    .role-name-wolf-converted {
      color: #66bb6a !important;
      text-shadow: 0 0 20px rgba(102, 187, 106, 0.3);
    }

    @media (max-width: 400px) {
      .action-buttons-row .btn { width: 46px; height: 42px; font-size: 17px; }
      .suggest-fab { width: 40px; height: 40px; font-size: 18px; top: 12px; left: 12px; }
      [dir="ltr"] .suggest-fab { left: auto; right: 12px; }
      #wolfMessagesList { max-height: 120px; }
    }
  </style>
</head>
<body>

  <button class="suggest-fab" id="suggestFabBtn" title="💬 اقتراحات للمطور">💬</button>

  <div class="container">
    <h2 id="playerTitle">🐺 لو ڨارو</h2>

    <div id="joinForm">
      <input type="text" id="playerName" placeholder="اسمك" />
      <input type="text" id="roomCodeInput" placeholder="رمز الغرفة" />
      <div class="join-form-buttons">
        <button class="btn btn-primary" id="joinBtn">انضم</button>
        <button class="btn btn-secondary" id="backBtn">🔙 رجوع</button>
      </div>
    </div>

    <div id="status" class="hidden" style="color: #ccc; margin: 20px 0; text-align:center;">
      <span id="waitingText">في انتظار بدء اللعبة...</span>
      <button class="btn btn-danger" id="leaveBtn" style="margin-top:15px;">مغادرة</button>
    </div>

    <div id="discordPlayerSection" class="discord-player-section hidden">
      <div class="title" id="discordTitle">🎙️ غرفة الصوت في Discord</div>
      <div class="link-box">
        <input type="text" id="discordPlayerLink" placeholder="لا يوجد رابط بعد..." readonly />
        <button class="btn-discord-join" id="joinDiscordBtn">🎙️ انضم</button>
      </div>
      <p style="color:#777; font-size:12px; margin-top:5px;" id="discordHint">💡 انضم إلى الغرفة الصوتية للتواصل مع اللاعبين أثناء اللعبة.</p>
    </div>

    <div id="roleBox" class="hidden"></div>
  </div>

  <button class="btn-suggest btn-suggest-old" id="suggestBtn">💬 اقتراحات للمطور</button>

  <div class="modal modal-message" id="messageModal">
    <div class="modal-content">
      <h3 style="color:#d4a017;">📩 إرسال رسالة إلى الراوي</h3>
      <p style="color:#aaa; font-size:13px; margin-bottom:10px;">اكتب رسالتك، سيتمكن الراوي من رؤيتها في صفحة التحكم.</p>
      <textarea id="messageText" placeholder="اكتب رسالتك هنا..."></textarea>
      <div class="flex" style="margin-top:10px;">
        <button class="btn btn-success" id="sendMessageBtn">📤 إرسال</button>
        <button class="btn" id="closeMessageModal">إلغاء</button>
      </div>
      <p id="messageStatus" style="color:#7a4e2d; font-size:13px; margin-top:8px; text-align:center;"></p>
    </div>
  </div>

  <div class="modal" id="suggestModal">
    <div class="modal-content">
      <h3 id="suggestTitle">📢 شارك فكرتك</h3>
      <p id="suggestDesc">ساعدنا في تطوير اللعبة بأفكارك الجديدة!</p>
      <input type="text" id="suggestName" placeholder="اسمك (اختياري)" />
      <textarea id="suggestMessage" placeholder="اكتب اقتراحك هنا..."></textarea>
      <button class="btn btn-primary" id="sendSuggest">🚀 إرسال</button>
      <button class="btn" id="closeSuggest" style="margin-top:8px;">إلغاء</button>
    </div>
  </div>

  <script type="module">
    import { t, setLanguage, getCurrentLang, translateDynamicRole } from './translations.js';
    import {
      getRoomCode, setRoomCode, clearRoomCode, addPlayer, getPlayer,
      listenToPlayers, deleteRoom, sendSuggestion, db, ref, update,
      remove, onValue, get, push, isPlayerWolf, sendWolfMessage,
      listenToWolfMessages
    } from "./logic.js";

    function applyTranslations() {
      document.title = t('appName') + ' - ' + t('playerTitle');
      document.getElementById('playerTitle').textContent = `🐺 ${t('appName')}`;
      document.getElementById('playerName').placeholder = t('yourNamePlaceholder');
      document.getElementById('roomCodeInput').placeholder = t('roomCodePlaceholder');
      document.getElementById('joinBtn').textContent = t('join');
      document.getElementById('backBtn').textContent = '🔙 ' + t('back');
      document.getElementById('waitingText').textContent = t('waitingForGame');
      document.getElementById('leaveBtn').textContent = t('leave');
      document.getElementById('discordTitle').textContent = '🎙️ ' + t('discordSettings');
      document.getElementById('discordHint').textContent = '💡 ' + t('discordHint');
      document.getElementById('joinDiscordBtn').textContent = '🎙️ ' + t('join');
      document.getElementById('suggestFabBtn').title = '💬 ' + t('suggestions');
      document.getElementById('suggestTitle').textContent = t('shareIdea');
      document.getElementById('suggestDesc').textContent = t('shareDesc');
      document.getElementById('suggestName').placeholder = t('yourName');
      document.getElementById('suggestMessage').placeholder = t('yourSuggestion');
      document.getElementById('sendSuggest').textContent = t('send');
      document.getElementById('closeSuggest').textContent = t('cancel');
      document.getElementById('sendMessageBtn').textContent = '📤 ' + t('send');
      document.getElementById('closeMessageModal').textContent = t('cancel');
      const lang = getCurrentLang();
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.documentElement.lang = lang;
    }
    applyTranslations();

    const nameInput = document.getElementById("playerName");
    const codeInput = document.getElementById("roomCodeInput");
    const joinBtn = document.getElementById("joinBtn");
    const backBtn = document.getElementById("backBtn");
    const joinForm = document.getElementById("joinForm");
    const statusDiv = document.getElementById("status");
    const roleBox = document.getElementById("roleBox");
    const leaveBtn = document.getElementById("leaveBtn");
    const waitingText = document.getElementById("waitingText");

    const messageModal = document.getElementById("messageModal");
    const messageText = document.getElementById("messageText");
    const sendMessageBtn = document.getElementById("sendMessageBtn");
    const closeMessageModal = document.getElementById("closeMessageModal");
    const messageStatus = document.getElementById("messageStatus");

    const suggestFab = document.getElementById("suggestFabBtn");
    const suggestModal = document.getElementById("suggestModal");

    const wolfChatContainer = document.getElementById('wolfChatContainer');
    const wolfMessagesList = document.getElementById('wolfMessagesList');
    const wolfMessageInput = document.getElementById('wolfMessageInput');
    const sendWolfMessageBtn = document.getElementById('sendWolfMessageBtn');
    const wolfVoteBtn = document.getElementById('wolfVoteBtn');

    const discordSection = document.getElementById("discordPlayerSection");
    const discordLinkInput = document.getElementById("discordPlayerLink");
    const joinDiscordBtn = document.getElementById("joinDiscordBtn");

    let playerId = localStorage.getItem("playerId");
    let roomCode = getRoomCode();
    let isWolf = false;
    let wolfMessagesListener = null;
    let gameStateListener = null;
    let playersListener = null;
    let narratorMessagesListener = null;

    function updateDiscordLink(roomCode) {
      const discordRef = ref(db, `rooms/${roomCode}/discordLink`);
      onValue(discordRef, (snapshot) => {
        const link = snapshot.val();
        if (link) {
          discordLinkInput.value = link;
          discordSection.classList.remove("hidden");
        } else {
          discordLinkInput.value = t('noLinkYet');
          discordSection.classList.add("hidden");
        }
      });
    }

    async function fetchRoleDescription(roleNameInput) {
      try {
        let targetName = roleNameInput;
        if (typeof roleNameInput === 'object' && roleNameInput !== null) {
          targetName = roleNameInput.ar || roleNameInput.fr || roleNameInput.en || '';
        }
        if (!targetName) return '';
        const snap = await get(ref(db, 'global_roles'));
        const roles = snap.val() || {};
        const lang = getCurrentLang();
        for (const key in roles) {
          const role = roles[key];
          const nameObj = role.name;
          let match = false;
          if (typeof nameObj === 'object') {
            if (nameObj.ar === targetName || nameObj.fr === targetName || nameObj.en === targetName) {
              match = true;
            }
          } else if (nameObj === targetName) {
            match = true;
          }
          if (match) {
            const desc = role.description;
            if (typeof desc === 'object') {
              return desc[lang] || desc.ar || desc.fr || desc.en || '';
            } else {
              return desc || '';
            }
          }
        }
        return '';
      } catch (e) {
        console.error('خطأ في جلب وصف الدور:', e);
        return '';
      }
    }

    async function sendMessageToNarrator() {
      const message = messageText.value.trim();
      if (!message) {
        messageStatus.textContent = '⚠️ الرجاء كتابة رسالة!';
        messageStatus.style.color = '#e74c3c';
        return;
      }
      if (!roomCode || !playerId) {
        messageStatus.textContent = '❌ لا توجد غرفة أو لاعب!';
        messageStatus.style.color = '#e74c3c';
        return;
      }
      try {
        const player = await getPlayer(roomCode, playerId);
        const playerName = player?.name || 'لاعب مجهول';
        const messagesRef = ref(db, `rooms/${roomCode}/messages`);
        await push(messagesRef, {
          playerId: playerId,
          playerName: playerName,
          message: message,
          timestamp: Date.now(),
          fromNarrator: false
        });
        messageStatus.textContent = '✅ تم إرسال الرسالة!';
        messageStatus.style.color = '#2ecc71';
        messageText.value = '';
        setTimeout(() => { messageStatus.textContent = ''; }, 3000);
        messageModal.style.display = 'none';
      } catch (e) {
        messageStatus.textContent = '❌ خطأ: ' + e.message;
        messageStatus.style.color = '#e74c3c';
      }
    }

    function showNarratorMessage(message) {
      const existingBox = document.getElementById('narratorMessageBox');
      if (existingBox) existingBox.remove();
      const box = document.createElement('div');
      box.id = 'narratorMessageBox';
      box.className = 'narrator-message-box';
      box.innerHTML = `
        <div class="msg-title">🎙️ رسالة من الراوي</div>
        <div class="msg-text">${message}</div>
        <button class="msg-close">إغلاق</button>
      `;
      const descElement = document.querySelector('.role-description');
      if (descElement) {
        descElement.after(box);
      } else {
        const wrapper = document.querySelector('.role-image-wrapper');
        if (wrapper) wrapper.after(box);
      }
      box.style.display = 'block';
      box.querySelector('.msg-close').addEventListener('click', () => {
        box.style.display = 'none';
      });
    }

    function listenToNarratorMessages(roomCode, playerId) {
      if (!roomCode || !playerId) return;
      if (narratorMessagesListener) {
        narratorMessagesListener();
        narratorMessagesListener = null;
      }
      const messagesRef = ref(db, `rooms/${roomCode}/messages`);
      narratorMessagesListener = onValue(messagesRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        const entries = Object.entries(data)
          .filter(([key, msg]) => msg.fromNarrator === true && msg.playerId === playerId)
          .sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));
        if (entries.length > 0) {
          const latest = entries[0][1];
          const lastMessageKey = localStorage.getItem('lastNarratorMessageKey_' + playerId);
          if (lastMessageKey !== entries[0][0]) {
            showNarratorMessage(latest.message);
            localStorage.setItem('lastNarratorMessageKey_' + playerId, entries[0][0]);
          }
        }
      });
    }

    function renderWolfMessages(data) {
      wolfMessagesList.innerHTML = '';
      if (!data) {
        wolfMessagesList.innerHTML = '<div style="color:#777; font-size:12px; text-align:center;">لا توجد رسائل بعد</div>';
        return;
      }
      const entries = Object.entries(data)
        .filter(([key, msg]) => !msg.systemMessage)
        .sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));
      if (entries.length === 0) {
        wolfMessagesList.innerHTML = '<div style="color:#777; font-size:12px; text-align:center;">لا توجد رسائل بعد</div>';
        return;
      }
      entries.forEach(([key, msg]) => {
        const div = document.createElement('div');
        div.className = 'wolf-msg';
        const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}) : '--:--';
        div.innerHTML = `
          <span class="wolf-name">🐺 ${msg.playerName}:</span>
          ${msg.message}
          <span class="wolf-time">${time}</span>
        `;
        wolfMessagesList.appendChild(div);
      });
      wolfMessagesList.scrollTop = wolfMessagesList.scrollHeight;
    }

    async function initWolfChat(roomCode, playerId) {
      if (!roomCode || !playerId) return;
      isWolf = await isPlayerWolf(roomCode, playerId);
      if (isWolf) {
        wolfChatContainer.style.display = 'block';
        if (wolfMessagesListener) wolfMessagesListener();
        wolfMessagesListener = listenToWolfMessages(roomCode, (data) => {
          renderWolfMessages(data);
        });
        if (gameStateListener) gameStateListener();
        const stateRef = ref(db, `rooms/${roomCode}/gameState`);
        gameStateListener = onValue(stateRef, (snapshot) => {
          const state = snapshot.val();
          if (state && state.isNight === true) {
            wolfChatContainer.style.display = 'block';
          } else {
            wolfChatContainer.style.display = 'none';
          }
        });
      } else {
        wolfChatContainer.style.display = 'none';
      }
    }

    if (sendWolfMessageBtn) {
      sendWolfMessageBtn.addEventListener('click', async () => {
        const message = wolfMessageInput.value.trim();
        if (!message || !roomCode || !playerId) return;
        const player = await getPlayer(roomCode, playerId);
        await sendWolfMessage(roomCode, playerId, player?.name || 'ذئب', message);
        wolfMessageInput.value = '';
      });
    }

    if (wolfMessageInput) {
      wolfMessageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && sendWolfMessageBtn) {
          sendWolfMessageBtn.click();
        }
      });
    }

    if (wolfVoteBtn) {
      wolfVoteBtn.addEventListener('click', async () => {
        const victim = prompt('🐺 اكتب اسم اللاعب الذي تريد قتله:');
        if (!victim || !roomCode || !playerId) return;
        const player = await getPlayer(roomCode, playerId);
        const messagesRef = ref(db, `rooms/${roomCode}/messages`);
        await push(messagesRef, {
          playerId: playerId,
          playerName: player?.name || 'ذئب',
          message: `🐺 الذئاب تريد قتل: ${victim}`,
          timestamp: Date.now(),
          fromNarrator: false,
          isWolfVote: true
        });

    async function checkPlayerStatus() {
      if (!playerId || !roomCode) return;
      try {
        const player = await getPlayer(roomCode, playerId);
        if (!player) {
          localStorage.clear();
          window.location.href = "index.html";
          return;
        }
        updateDiscordLink(roomCode);

        if (player.isDead) {
          statusDiv.classList.add("hidden");
          roleBox.classList.remove("hidden");
          roleBox.innerHTML = `
            <div id="skull">💀</div>
            <p id="death-text">${player.isInfected ? t('infectedDeathMessage') : t('deathMessage')}</p>
            <button class="btn btn-danger" id="exitBtn" style="margin-top:10px;">🚪 ${t('exitGame')}</button>
          `;
          const exitBtn = document.getElementById("exitBtn");
          if (exitBtn) {
            exitBtn.addEventListener('click', async function() {
              await deleteRoom(roomCode);
              localStorage.clear();
              window.location.href = "index.html";
            });
          }
          return;
        }

        if (player.isInfected && !player.isDead) {
          statusDiv.classList.add("hidden");
          roleBox.classList.remove("hidden");
          roleBox.innerHTML = `<button class="btn-show-card" id="showInfectedBtn">🃏 ${t('showCard')}</button>`;
          const showBtn = document.getElementById("showInfectedBtn");
          if (showBtn) {
            showBtn.addEventListener('click', function() {
              renderInfectedContent(player);
            });
          }
          return;
        }

        if (player.isWolf && !player.isDead) {
          statusDiv.classList.add("hidden");
          roleBox.classList.remove("hidden");
          roleBox.innerHTML = `<button class="btn-show-card" id="showWolfBtn">🃏 ${t('showCard')}</button>`;
          const showBtn = document.getElementById("showWolfBtn");
          if (showBtn) {
            showBtn.addEventListener('click', function() {
              renderWolfContent(player);
            });
          }
          return;
        }

        if (player.role) {
          statusDiv.classList.add("hidden");
          roleBox.classList.remove("hidden");
          roleBox.innerHTML = `<button class="btn-show-card" id="showRoleBtn">🃏 ${t('showCard')}</button>`;
          const showBtn = document.getElementById("showRoleBtn");
          if (showBtn) {
            showBtn.addEventListener('click', function() {
              renderRoleContent(player);
            });
          }
          return;
        }

        statusDiv.classList.remove("hidden");
        waitingText.textContent = t('waitingForGame') + ` (${t('roomCode')} ${roomCode})`;

        if (playersListener) playersListener();
        playersListener = listenToPlayers(roomCode, async (data) => {
          if (!data) return;
          const current = data[playerId];
          if (current && (current.role || current.isDead || current.isInfected || current.isWolf)) {
            checkPlayerStatus();
          }
        });
      } catch (err) {
        console.error('خطأ في checkPlayerStatus:', err);
      }
    }

    joinBtn.addEventListener("click", async () => {
      const name = nameInput.value.trim();
      const enteredRoom = codeInput.value.trim();
      if (!name || !enteredRoom) {
        alert(t('fillAllFields'));
        return;
      }
      roomCode = enteredRoom;
      try {
        playerId = await addPlayer(roomCode, name);
        localStorage.setItem("playerId", playerId);
        setRoomCode(roomCode);
        joinForm.classList.add("hidden");
        statusDiv.classList.remove("hidden");
        updateDiscordLink(roomCode);
        checkPlayerStatus();
      } catch (err) {
        alert("❌ " + t('errorOccurred') + ": " + err.message);
      }
    });

    backBtn.addEventListener("click", () => {
      window.location.href = "index.html";
    });

    leaveBtn.onclick = async () => {
      if (confirm('⚠️ هل أنت متأكد من مغادرة الغرفة؟')) {
        try {
          if (roomCode && playerId) {
            await remove(ref(db, `rooms/${roomCode}/players/${playerId}`));
          }
          await deleteRoom(roomCode);
        } catch (err) {
          console.error(err);
        }
        localStorage.clear();
        window.location.href = "index.html";
      }
    };

    joinDiscordBtn.addEventListener("click", () => {
      const link = discordLinkInput.value;
      if (link && link.startsWith("https://")) {
        window.open(link, "_blank");
      } else {
        alert(t('noDiscordLink'));
      }
    });

    suggestFab.addEventListener('click', () => {
      suggestModal.style.display = 'flex';
    });

    closeMessageModal.addEventListener('click', () => {
      messageModal.style.display = 'none';
    });

    window.addEventListener('click', (e) => {
      if (e.target === messageModal) messageModal.style.display = 'none';
    });

    sendMessageBtn.addEventListener('click', sendMessageToNarrator);

    document.getElementById("closeSuggest").addEventListener("click", () => {
      suggestModal.style.display = "none";
    });
    window.addEventListener("click", (e) => {
      if (e.target === suggestModal) suggestModal.style.display = "none";
    });

    document.getElementById("sendSuggest").addEventListener("click", async () => {
      const name = document.getElementById("suggestName").value.trim();
      const message = document.getElementById("suggestMessage").value.trim();
      if (!message) {
        alert(t('writeMessage'));
        return;
      }
      try {
        await sendSuggestion(name, message, roomCode || t('unknown'));
        alert("✅ " + t('suggestionSent'));
        document.getElementById("suggestMessage").value = "";
        suggestModal.style.display = "none";
      } catch (err) {
        alert("❌ " + t('errorOccurred') + ": " + err.message);
      }
    });

    if (playerId && roomCode) {
      try {
        const player = await getPlayer(roomCode, playerId);
        if (player) {
          joinForm.classList.add("hidden");
          statusDiv.classList.remove("hidden");
          updateDiscordLink(roomCode);
          checkPlayerStatus();
        } else {
          localStorage.clear();
          window.location.href = "index.html";
        }
      } catch (err) {
        console.error('خطأ في التحقق من الجلسة:', err);
      }
    }

    console.log('🚀 تم تحميل صفحة اللاعب');
  </script>
