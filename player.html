<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لو ڨارو - لاعب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .btn-suggest {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: auto;
      padding: 12px 20px;
      background: #2c2c2c;
      border: 1px solid crimson;
      border-radius: 30px;
      color: #fff;
      font-size: 14px;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
      z-index: 999;
      margin: 0;
    }
    .btn-suggest:hover {
      background: #3a3a3a;
      box-shadow: 0 0 30px crimson;
    }
    #roleBox .btn-group-vertical {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 15px;
    }
    #roleBox .btn-group-vertical .btn {
      width: 100%;
    }
    .role-image-wrapper {
      position: relative;
      width: 100%;
      max-width: 300px;
      margin: 10px auto;
    }
    .role-image-wrapper img.role-img {
      width: 100%;
      border-radius: 12px;
      border: 2px solid crimson;
    }
    .role-image-wrapper img.blood-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }
    .role-description {
      background: #1a1a1a;
      border: 1px solid #555;
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 10px;
      color: #ccc;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.3px;
    }
    .role-description strong {
      color: #d4a017;
    }

    .discord-player-section {
      background: #1a1a1a;
      border: 1px solid #5865F2;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
    }
    .discord-player-section .title {
      color: #5865F2;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .discord-player-section .link-box {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: #0d0d0d;
      padding: 10px;
      border-radius: 8px;
      margin-top: 8px;
      border: 1px solid #333;
    }
    .discord-player-section .link-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: #ccc;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      padding: 5px;
      min-width: 120px;
      direction: ltr;
    }
    .discord-player-section .link-box input:focus {
      outline: none;
    }
    .discord-player-section .btn-discord-join {
      background: #5865F2;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }
    .discord-player-section .btn-discord-join:hover {
      background: #4752C4;
      box-shadow: 0 0 15px #5865F2;
    }

    .btn-secondary {
      background: #2c2c2c;
      color: #fff;
      border: 1px solid #555;
    }
    .btn-secondary:hover {
      background: #3a3a3a;
      border-color: #777;
    }
    .join-form-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .join-form-buttons .btn {
      flex: 1;
      min-width: 100px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="playerTitle">🐺 لو ڨارو</h2>

    <div id="joinForm">
      <input type="text" id="playerName" placeholder="اسمك" />
      <input type="text" id="roomCodeInput" placeholder="رمز الغرفة" />
      <div class="join-form-buttons">
        <button class="btn btn-primary" id="joinBtn">انضم</button>
        <button class="btn btn-secondary" id="backBtn">🔙 رجوع</button>
      </div>
    </div>

    <div id="status" class="hidden" style="color: #ccc; margin: 20px 0; text-align:center;">
      <span id="waitingText">في انتظار بدء اللعبة...</span>
      <button class="btn btn-danger" id="leaveBtn" style="margin-top:15px;">مغادرة</button>
    </div>

    <div id="discordPlayerSection" class="discord-player-section hidden">
      <div class="title" id="discordTitle">🎙️ غرفة الصوت في Discord</div>
      <div class="link-box">
        <input type="text" id="discordPlayerLink" placeholder="لا يوجد رابط بعد..." readonly />
        <button class="btn-discord-join" id="joinDiscordBtn">🎙️ انضم</button>
      </div>
      <p style="color:#777; font-size:12px; margin-top:5px;" id="discordHint">💡 انضم إلى الغرفة الصوتية للتواصل مع اللاعبين أثناء اللعبة.</p>
    </div>

    <div id="roleBox" class="hidden"></div>
  </div>

  <button class="btn-suggest" id="suggestBtn">💬 اقتراحات للمطور</button>

  <div class="modal" id="suggestModal">
    <div class="modal-content">
      <h3 id="suggestTitle">📢 شارك فكرتك</h3>
      <p id="suggestDesc">ساعدنا في تطوير اللعبة بأفكارك الجديدة!</p>
      <input type="text" id="suggestName" placeholder="اسمك (اختياري)" />
      <textarea id="suggestMessage" placeholder="اكتب اقتراحك هنا..."></textarea>
      <button class="btn btn-primary" id="sendSuggest">🚀 إرسال</button>
      <button class="btn" id="closeSuggest" style="margin-top:8px;">إلغاء</button>
    </div>
  </div>

  <script type="module">
    import { t, setLanguage, getCurrentLang, translateDynamicRole } from './translations.js';
    import {
      getRoomCode,
      setRoomCode,
      clearRoomCode,
      addPlayer,
      getPlayer,
      listenToPlayers,
      deleteRoom,
      sendSuggestion,
      db,
      ref,
      update,
      remove,
      onValue,
      get
    } from "./logic.js";

    function applyTranslations() {
      document.title = t('appName') + ' - ' + t('playerTitle');
      document.getElementById('playerTitle').textContent = `🐺 ${t('appName')}`;
      document.getElementById('playerName').placeholder = t('yourNamePlaceholder');
      document.getElementById('roomCodeInput').placeholder = t('roomCodePlaceholder');
      document.getElementById('joinBtn').textContent = t('join');
      document.getElementById('backBtn').textContent = '🔙 ' + t('back');
      document.getElementById('waitingText').textContent = t('waitingForGame');
      document.getElementById('leaveBtn').textContent = t('leave');
      document.getElementById('discordTitle').textContent = '🎙️ ' + t('discordSettings');
      document.getElementById('discordHint').textContent = '💡 ' + t('discordHint');
      document.getElementById('joinDiscordBtn').textContent = '🎙️ ' + t('join');
      document.getElementById('suggestBtn').textContent = t('suggestions');
      document.getElementById('suggestTitle').textContent = t('shareIdea');
      document.getElementById('suggestDesc').textContent = t('shareDesc');
      document.getElementById('suggestName').placeholder = t('yourName');
      document.getElementById('suggestMessage').placeholder = t('yourSuggestion');
      document.getElementById('sendSuggest').textContent = t('send');
      document.getElementById('closeSuggest').textContent = t('cancel');

      const lang = getCurrentLang();
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.documentElement.lang = lang;
    }

    applyTranslations();

    const nameInput = document.getElementById("playerName");
    const codeInput = document.getElementById("roomCodeInput");
    const joinBtn = document.getElementById("joinBtn");
    const backBtn = document.getElementById("backBtn");
    const joinForm = document.getElementById("joinForm");
    const statusDiv = document.getElementById("status");
    const roleBox = document.getElementById("roleBox");
    const leaveBtn = document.getElementById("leaveBtn");
    const waitingText = document.getElementById("waitingText");

    const discordSection = document.getElementById("discordPlayerSection");
    const discordLinkInput = document.getElementById("discordPlayerLink");
    const joinDiscordBtn = document.getElementById("joinDiscordBtn");

    let playerId = localStorage.getItem("playerId");
    let roomCode = getRoomCode();

    function updateDiscordLink(roomCode) {
      const discordRef = ref(db, `rooms/${roomCode}/discordLink`);
      onValue(discordRef, (snapshot) => {
        const link = snapshot.val();
        if (link) {
          discordLinkInput.value = link;
          discordSection.classList.remove("hidden");
        } else {
          discordLinkInput.value = t('noLinkYet');
          discordSection.classList.add("hidden");
        }
      });
    }

    async function fetchRoleDescription(roleNameInput) {
      try {
        let targetName = roleNameInput;
        if (typeof roleNameInput === 'object' && roleNameInput !== null) {
          targetName = roleNameInput.ar || roleNameInput.fr || roleNameInput.en || '';
        }
        if (!targetName) return '';

        const snap = await get(ref(db, 'global_roles'));
        const roles = snap.val() || {};
        const lang = getCurrentLang();

        for (const key in roles) {
          const role = roles[key];
          const nameObj = role.name;
          let match = false;
          if (typeof nameObj === 'object') {
            if (nameObj.ar === targetName || nameObj.fr === targetName || nameObj.en === targetName) {
              match = true;
            }
          } else if (nameObj === targetName) {
            match = true;
          }
          if (match) {
            const desc = role.description;
            if (typeof desc === 'object') {
              return desc[lang] || desc.ar || desc.fr || desc.en || '';
            } else {
              return desc || '';
            }
          }
        }
        return '';
      } catch (e) {
        console.error('خطأ في جلب وصف الدور:', e);
        return '';
      }
    }

    async function renderRoleContent(player) {
      const roleDisplay = translateDynamicRole(player.role);
      const roleText = t('yourRole') + ' ' + roleDisplay;
      const description = await fetchRoleDescription(player.role);
      
      roleBox.innerHTML = `
        <div class="role-name">${roleText}</div>
        <div class="role-image-wrapper">
          <img src="${player.roleImage || 'https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png'}" class="role-img" />
        </div>
        ${description ? `<div class="role-description"><strong>📖 ${t('roleDescription')}:</strong> ${description}</div>` : ''}
        <div class="btn-group-vertical">
          <button class="btn btn-primary" id="hideRoleBtn">🔒 ${t('hideCard')}</button>
          <button class="btn btn-danger" id="suicideBtn">💀 ${t('suicide')}</button>
        </div>
      `;

      document.getElementById("hideRoleBtn").onclick = () => {
        roleBox.innerHTML = `<button class="btn btn-primary" id="showRoleBtn">🃏 ${t('showCard')}</button>`;
        document.getElementById("showRoleBtn").onclick = () => renderRoleContent(player);
      };

      document.getElementById("suicideBtn").onclick = async () => {
        if (!confirm(t('confirmSuicide'))) return;
        try {
          await update(ref(db, `rooms/${roomCode}/players/${playerId}`), { isDead: true });
          roleBox.innerHTML = `
            <div id="skull">💀</div>
            <p id="death-text">${t('deathMessage')}</p>
            <button class="btn btn-danger" id="exitBtn" style="margin-top:10px;">🚪 ${t('exitGame')}</button>
          `;
          document.getElementById("exitBtn").onclick = async () => {
            await deleteRoom(roomCode);
            localStorage.clear();
            window.location.href = "index.html";
          };
        } catch (err) {
          alert("❌ " + t('errorOccurred') + ": " + err.message);
        }
      };
    }

    async function renderInfectedContent(player) {
      const description = await fetchRoleDescription(player.role);
      roleBox.innerHTML = `
        <div class="role-name" style="color:#66bb6a;">${t('infectedMessage')}</div>
        <div class="role-image-wrapper">
          <img src="${player.roleImage || 'https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png'}" class="role-img" />
          <img src="https://i.postimg.cc/y8Dhy5VS/IMG-20260708-204243.png" class="blood-overlay" />
        </div>
        ${description ? `<div class="role-description"><strong>📖 ${t('roleDescription')}:</strong> ${description}</div>` : ''}
        <div class="btn-group-vertical">
          <button class="btn btn-primary" id="hideInfectedBtn">🔒 ${t('hideCard')}</button>
          <button class="btn btn-danger" id="suicideInfectedBtn">💀 ${t('suicide')}</button>
        </div>
      `;

      document.getElementById("hideInfectedBtn").onclick = () => {
        roleBox.innerHTML = `<button class="btn btn-primary" id="showInfectedBtn">🃏 ${t('showCard')}</button>`;
        document.getElementById("showInfectedBtn").onclick = () => renderInfectedContent(player);
      };

      document.getElementById("suicideInfectedBtn").onclick = async () => {
        if (!confirm(t('confirmSuicide'))) return;
        try {
          await update(ref(db, `rooms/${roomCode}/players/${playerId}`), { isDead: true });
          roleBox.innerHTML = `
            <div id="skull">💀</div>
            <p id="death-text">${t('infectedDeathMessage')}</p>
            <button class="btn btn-danger" id="exitBtn" style="margin-top:10px;">🚪 ${t('exitGame')}</button>
          `;
          document.getElementById("exitBtn").onclick = async () => {
            await deleteRoom(roomCode);
            localStorage.clear();
            window.location.href = "index.html";
          };
        } catch (err) {
          alert("❌ " + t('errorOccurred') + ": " + err.message);
        }
      };
    }

    async function checkPlayerStatus() {
      if (!playerId || !roomCode) return;
      const player = await getPlayer(roomCode, playerId);
      if (!player) {
        localStorage.clear();
        window.location.href = "index.html";
        return;
      }

      updateDiscordLink(roomCode);

      if (player.isDead) {
        statusDiv.classList.add("hidden");
        roleBox.classList.remove("hidden");
        roleBox.innerHTML = `
          <div id="skull">💀</div>
          <p id="death-text">${player.isInfected ? t('infectedDeathMessage') : t('deathMessage')}</p>
          <button class="btn btn-danger" id="exitBtn" style="margin-top:10px;">🚪 ${t('exitGame')}</button>
        `;
        document.getElementById("exitBtn").onclick = async () => {
          await deleteRoom(roomCode);
          localStorage.clear();
          window.location.href = "index.html";
        };
        return;
      }

      if (player.isInfected && !player.isDead) {
        statusDiv.classList.add("hidden");
        roleBox.classList.remove("hidden");
        roleBox.innerHTML = `<button class="btn btn-primary" id="showInfectedBtn">🃏 ${t('showCard')}</button>`;
        document.getElementById("showInfectedBtn").onclick = () => renderInfectedContent(player);
        return;
      }

      if (player.role) {
        statusDiv.classList.add("hidden");
        roleBox.classList.remove("hidden");
        roleBox.innerHTML = `<button class="btn btn-primary" id="showRoleBtn">🃏 ${t('showCard')}</button>`;
        document.getElementById("showRoleBtn").onclick = () => renderRoleContent(player);
        return;
      }

      statusDiv.classList.remove("hidden");
      waitingText.textContent = t('waitingForGame') + ` (${t('roomCode')} ${roomCode})`;

      listenToPlayers(roomCode, async (data) => {
        if (!data) return;
        const current = data[playerId];
        if (current && (current.role || current.isDead || current.isInfected)) {
          checkPlayerStatus();
        }
      });
    }

    joinBtn.addEventListener("click", async () => {
      const name = nameInput.value.trim();
      const enteredRoom = codeInput.value.trim();
      if (!name || !enteredRoom) {
        alert(t('fillAllFields'));
        return;
      }
      roomCode = enteredRoom;
      try {
        playerId = await addPlayer(roomCode, name);
        localStorage.setItem("playerId", playerId);
        setRoomCode(roomCode);
        joinForm.classList.add("hidden");
        statusDiv.classList.remove("hidden");

        updateDiscordLink(roomCode);
        checkPlayerStatus();
      } catch (err) {
        alert("❌ " + t('errorOccurred') + ": " + err.message);
      }
    });

    backBtn.addEventListener("click", () => {
      window.location.href = "index.html";
    });

    leaveBtn.onclick = async () => {
      await deleteRoom(roomCode);
      localStorage.clear();
      window.location.href = "index.html";
    };

    joinDiscordBtn.addEventListener("click", () => {
      const link = discordLinkInput.value;
      if (link && link.startsWith("https://")) {
        window.open(link, "_blank");
      } else {
        alert(t('noDiscordLink'));
      }
    });

    const modal = document.getElementById("suggestModal");
    document.getElementById("suggestBtn").addEventListener("click", () => {
      modal.style.display = "flex";
    });
    document.getElementById("closeSuggest").addEventListener("click", () => {
      modal.style.display = "none";
    });
    window.addEventListener("click", (e) => {
      if (e.target === modal) modal.style.display = "none";
    });

    document.getElementById("sendSuggest").addEventListener("click", async () => {
      const name = document.getElementById("suggestName").value.trim();
      const message = document.getElementById("suggestMessage").value.trim();
      if (!message) {
        alert(t('writeMessage'));
        return;
      }
      try {
        await sendSuggestion(name, message, roomCode || t('unknown'));
        alert("✅ " + t('suggestionSent'));
        document.getElementById("suggestMessage").value = "";
        modal.style.display = "none";
      } catch (err) {
        alert("❌ " + t('errorOccurred') + ": " + err.message);
      }
    });

    if (playerId && roomCode) {
      joinForm.classList.add("hidden");
      statusDiv.classList.remove("hidden");
      updateDiscordLink(roomCode);
      checkPlayerStatus();
    }
  </script>
</body>
</html>
