<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>loupe garou- لاعب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .btn-suggest {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: auto;
      padding: 12px 20px;
      background: #2c2c2c;
      border: 1px solid crimson;
      border-radius: 30px;
      color: #fff;
      font-size: 14px;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
      z-index: 999;
      margin: 0;
    }
    .btn-suggest:hover {
      background: #3a3a3a;
      box-shadow: 0 0 30px crimson;
    }
    #roleBox .btn-group-vertical {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 15px;
    }
    #roleBox .btn-group-vertical .btn {
      width: 100%;
    }
    .role-image-wrapper {
      position: relative;
      width: 100%;
      max-width: 300px;
      margin: 10px auto;
    }
    .role-image-wrapper img.role-img {
      width: 100%;
      border-radius: 12px;
      border: 2px solid crimson;
    }
    .role-image-wrapper img.blood-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🐺 loup garou</h2>

    <div id="joinForm">
      <input type="text" id="playerName" placeholder="اسمك" />
      <input type="text" id="roomCodeInput" placeholder="رمز الغرفة" />
      <button class="btn btn-primary" id="joinBtn">انضم</button>
    </div>

    <div id="status" class="hidden" style="color: #ccc; margin: 20px 0; text-align:center;">
      <span id="waitingText">في انتظار بدء اللعبة...</span>
      <button class="btn btn-danger" id="leaveBtn" style="margin-top:15px;">مغادرة</button>
    </div>

    <div id="roleBox" class="hidden"></div>
  </div>

  <button class="btn-suggest" id="suggestBtn">💬 اقتراحات للمطور</button>

  <div class="modal" id="suggestModal">
    <div class="modal-content">
      <h3>📢 شارك فكرتك</h3>
      <p>ساعدنا في تطوير اللعبة بأفكارك الجديدة!</p>
      <input type="text" id="suggestName" placeholder="اسمك (اختياري)" />
      <textarea id="suggestMessage" placeholder="اكتب اقتراحك هنا..."></textarea>
      <button class="btn btn-primary" id="sendSuggest">🚀 إرسال</button>
      <button class="btn" id="closeSuggest" style="margin-top:8px;">إلغاء</button>
    </div>
  </div>

  <script type="module">
    import {
      getRoomCode,
      setRoomCode,
      clearRoomCode,
      addPlayer,
      getPlayer,
      listenToPlayers,
      deleteRoom,
      sendSuggestion,
      db,
      ref,
      update,
      remove
    } from "./logic.js";

    // ===== عناصر الصفحة =====
    const nameInput = document.getElementById("playerName");
    const codeInput = document.getElementById("roomCodeInput");
    const joinBtn = document.getElementById("joinBtn");
    const joinForm = document.getElementById("joinForm");
    const statusDiv = document.getElementById("status");
    const roleBox = document.getElementById("roleBox");
    const leaveBtn = document.getElementById("leaveBtn");
    const waitingText = document.getElementById("waitingText");

    let playerId = localStorage.getItem("playerId");
    let roomCode = getRoomCode();

    // ===== عرض البطاقة العادية =====
    function renderRoleContent(player) {
      roleBox.innerHTML = `
        <div class="role-name">دورك هو: ${player.role}</div>
        <div class="role-image-wrapper">
          <img src="${player.roleImage || 'https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png'}" class="role-img" />
        </div>
        <div class="btn-group-vertical">
          <button class="btn btn-primary" id="hideRoleBtn">🔒 إخفاء البطاقة</button>
          <button class="btn btn-danger" id="suicideBtn">💀 انتحار (اخرج من اللعبة)</button>
        </div>
      `;

      document.getElementById("hideRoleBtn").onclick = () => {
        roleBox.innerHTML = `<button class="btn btn-primary" id="showRoleBtn">🃏 إظهار البطاقة</button>`;
        document.getElementById("showRoleBtn").onclick = () => renderRoleContent(player);
      };

      // ===== زر الانتحار (يُحدث الحالة إلى ميت، ولا يحذف اللاعب) =====
      document.getElementById("suicideBtn").onclick = async () => {
        if (!confirm("⚠️ هل أنت متأكد من رغبتك في الانتحار؟")) return;
        try {
          await update(ref(db, `rooms/${roomCode}/players/${playerId}`), { isDead: true });
          // عرض شاشة الموت للاعب مع إمكانية الخروج
          roleBox.innerHTML = `
            <div id="skull">💀</div>
            <p id="death-text">لقد انتحرت! .</p>
            <button class="btn btn-danger" id="exitBtn" style="margin-top:10px;">🚪 الخروج</button>
          `;
          document.getElementById("exitBtn").onclick = async () => {
            await deleteRoom(roomCode);
            localStorage.clear();
            window.location.href = "index.html";
          };
        } catch (err) {
          alert("حدث خطأ: " + err.message);
        }
      };
    }

    // ===== عرض البطاقة للمستذئب =====
    function renderInfectedContent(player) {
      roleBox.innerHTML = `
        <div class="role-name" style="color:#66bb6a;">🐺 لقد أصبحت مستذئبًا!</div>
        <div class="role-image-wrapper">
          <img src="${player.roleImage || 'https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png'}" class="role-img" />
          <img src="https://i.postimg.cc/MKsHYNG3/1000022868-removebg-preview.png" class="blood-overlay" />
        </div>
        <div class="btn-group-vertical">
          <button class="btn btn-primary" id="hideInfectedBtn">🔒 إخفاء البطاقة</button>
          <button class="btn btn-danger" id="suicideInfectedBtn">💀 انتحار (اخرج من اللعبة)</button>
        </div>
      `;

      document.getElementById("hideInfectedBtn").onclick = () => {
        roleBox.innerHTML = `<button class="btn btn-primary" id="showInfectedBtn">🃏 إظهار البطاقة</button>`;
        document.getElementById("showInfectedBtn").onclick = () => renderInfectedContent(player);
      };

      // زر الانتحار في حالة المستذئب (أيضاً تحديث وليس حذف)
      document.getElementById("suicideInfectedBtn").onclick = async () => {
        if (!confirm("⚠️ هل أنت متأكد من رغبتك في الانتحار؟")) return;
        try {
          await update(ref(db, `rooms/${roomCode}/players/${playerId}`), { isDead: true });
          roleBox.innerHTML = `
            <div id="skull">💀</div>
            <p id="death-text">لقد انتحرت! سيظهر لك الراوي كميت.</p>
            <button class="btn btn-danger" id="exitBtn" style="margin-top:10px;">🚪 الخروج</button>
          `;
          document.getElementById("exitBtn").onclick = async () => {
            await deleteRoom(roomCode);
            localStorage.clear();
            window.location.href = "index.html";
          };
        } catch (err) {
          alert("حدث خطأ: " + err.message);
        }
      };
    }

    // ===== التحقق من حالة اللاعب =====
    async function checkPlayerStatus() {
      if (!playerId || !roomCode) return;
      const player = await getPlayer(roomCode, playerId);
      if (!player) {
        localStorage.clear();
        window.location.href = "index.html";
        return;
      }

      // إذا كان ميتاً
      if (player.isDead) {
        statusDiv.classList.add("hidden");
        roleBox.classList.remove("hidden");
        roleBox.innerHTML = `
          <div id="skull">💀</div>
          <p id="death-text">${player.isInfected ? "لقد تم تحويلك إلى مستذئب ثم قتلك!" : "لقد تم قتلك!"}</p>
          <button class="btn btn-danger" id="exitBtn" style="margin-top:10px;">🚪 الخروج من اللعبة</button>
        `;
        document.getElementById("exitBtn").onclick = async () => {
          await deleteRoom(roomCode);
          localStorage.clear();
          window.location.href = "index.html";
        };
        return;
      }

      // إذا كان مستذئباً
      if (player.isInfected && !player.isDead) {
        statusDiv.classList.add("hidden");
        roleBox.classList.remove("hidden");
        // تبدأ البطاقة مغلقة
        roleBox.innerHTML = `<button class="btn btn-primary" id="showInfectedBtn">🃏 إظهار البطاقة</button>`;
        document.getElementById("showInfectedBtn").onclick = () => renderInfectedContent(player);
        return;
      }

      // إذا كان لديه دور عادي
      if (player.role) {
        statusDiv.classList.add("hidden");
        roleBox.classList.remove("hidden");
        roleBox.innerHTML = `<button class="btn btn-primary" id="showRoleBtn">🃏 إظهار البطاقة</button>`;
        document.getElementById("showRoleBtn").onclick = () => renderRoleContent(player);
        return;
      }

      // في انتظار البدء
      statusDiv.classList.remove("hidden");
      waitingText.textContent = `في انتظار بدء اللعبة... (الغرفة ${roomCode})`;

      listenToPlayers(roomCode, async (data) => {
        if (!data) return;
        const current = data[playerId];
        if (current && (current.role || current.isDead || current.isInfected)) {
          checkPlayerStatus();
        }
      });
    }

    // ===== الانضمام =====
    joinBtn.addEventListener("click", async () => {
      const name = nameInput.value.trim();
      const enteredRoom = codeInput.value.trim();
      if (!name || !enteredRoom) {
        alert("يرجى إدخال الاسم ورمز الغرفة.");
        return;
      }
      roomCode = enteredRoom;
      try {
        playerId = await addPlayer(roomCode, name);
        localStorage.setItem("playerId", playerId);
        setRoomCode(roomCode);
        joinForm.classList.add("hidden");
        statusDiv.classList.remove("hidden");
        checkPlayerStatus();
      } catch (err) {
        alert("خطأ: " + err.message);
      }
    });

    // ===== مغادرة =====
    leaveBtn.onclick = async () => {
      await deleteRoom(roomCode);
      localStorage.clear();
      window.location.href = "index.html";
    };

    // ===== الاقتراحات =====
    const modal = document.getElementById("suggestModal");
    document.getElementById("suggestBtn").addEventListener("click", () => {
      modal.style.display = "flex";
    });
    document.getElementById("closeSuggest").addEventListener("click", () => {
      modal.style.display = "none";
    });
    window.addEventListener("click", (e) => {
      if (e.target === modal) modal.style.display = "none";
    });

    document.getElementById("sendSuggest").addEventListener("click", async () => {
      const name = document.getElementById("suggestName").value.trim();
      const message = document.getElementById("suggestMessage").value.trim();
      if (!message) {
        alert("الرجاء كتابة رسالة!");
        return;
      }
      try {
        await sendSuggestion(name, message, roomCode || "خارج الغرفة");
        alert("✅ شكراً لك! تم إرسال اقتراحك.");
        document.getElementById("suggestMessage").value = "";
        modal.style.display = "none";
      } catch (err) {
        alert("❌ خطأ: " + err.message);
      }
    });

    // ===== جلسة سابقة =====
    if (playerId && roomCode) {
      joinForm.classList.add("hidden");
      statusDiv.classList.remove("hidden");
      checkPlayerStatus();
    }
  </script>
</body>
</html>
