<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لو ڨارو - الراوي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* تحسينات التصميم الاحترافي */
    .section { background: #111; border: 1px solid #333; border-radius: 20px; padding: 25px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .section-title { color: #d4a017; font-size: 18px; margin-bottom: 20px; display: block; text-align: center; letter-spacing: 2px; }
    
    /* شبكة الصور الدائرية (6 في السطر) */
    .roles-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 10px; }
    .role-item { text-align: center; cursor: pointer; transition: 0.3s; padding: 5px; }
    .role-item img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #555; object-fit: cover; transition: 0.3s; }
    .role-item.selected img { border-color: #d4a017; box-shadow: 0 0 10px #d4a017; transform: scale(1.1); }
    .role-name { font-size: 10px; margin-top: 6px; color: #aaa; white-space: nowrap; }

    /* تحسين الأزرار والخانات */
    .counter-group { display: flex; gap: 30px; justify-content: center; }
    .counter-item { text-align: center; }
    .counter-item label { display: block; margin-bottom: 8px; color: #888; font-size: 12px; }
    .counter-item input { width: 60px; text-align: center; padding: 8px; background: #000; border: 1px solid #444; color: #d4a017; border-radius: 8px; font-size: 16px; font-weight: bold; }
    
    .btn { padding: 14px 20px; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: #fff; cursor: pointer; transition: 0.3s; font-family: 'Cinzel', serif; }
    .btn-success { background: #1a4a1a; border-color: #2e7d32; width: 100%; font-size: 18px; }
    .btn-success:hover { background: #2e7d32; }
    
    .player-item { background: #1a1a1a; border: 1px solid #333; padding: 12px 15px; margin-bottom: 8px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    
    /* استجابة الشاشات الصغيرة */
    @media (max-width: 600px) { .roles-grid { grid-template-columns: repeat(4, 1fr); } }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="hostTitle" style="color:#d4a017;">🐺 الراوي</h2>

    <div class="section">
      <span class="section-title" id="extraRolesTitle">🃏 الأدوار الإضافية</span>
      <div id="rolesGrid" class="roles-grid"></div>
    </div>

    <div class="section">
      <span class="section-title" id="roomSettingsTitle">⚙️ إعدادات الغرفة</span>
      <div class="counter-group">
        <div class="counter-item">
          <label>🐺 الذئاب</label>
          <input type="number" id="wolvesCount" value="2" min="1" />
        </div>
        <div class="counter-item">
          <label>👨‍🌾 القرويين</label>
          <input type="number" id="villagersCount" value="3" min="1" />
        </div>
      </div>
    </div>

    <div class="section">
      <span class="section-title" id="playersTitle">👥 اللاعبون</span>
      <div id="playersList" class="player-list"></div>
      <div style="display:flex; gap:10px; margin-top:15px;">
        <button class="btn" id="exitBtn" style="flex:1;">🚪 خروج</button>
        <button class="btn" id="refreshBtn" style="flex:1;">🔄 تحديث</button>
      </div>
    </div>

    <button class="btn btn-success" id="startGameBtn" style="margin-top:20px;">🚀 بدء اللعبة</button>
  </div>

  <script type="module">
    import { t, translateDynamicRole } from './translations.js';
    import { getRoomCode, createOrGetRoom, deleteRoom, clearRoomCode, listenToPlayers, distributeRoles, db, ref, get } from "./logic.js";

    const roomCode = getRoomCode();
    if (!roomCode) { await createOrGetRoom(); location.reload(); }

    const rolesGrid = document.getElementById('rolesGrid');
    const playersList = document.getElementById('playersList');
    let selectedRoles = [];

    async function loadRoles() {
      const snap = await get(ref(db, 'global_roles'));
      const roles = snap.val() || {};
      rolesGrid.innerHTML = '';
      Object.entries(roles).forEach(([id, role]) => {
        const div = document.createElement('div');
        div.className = 'role-item';
        div.innerHTML = `
          <img src="${role.imageUrl || 'https://via.placeholder.com/100'}" />
          <div class="role-name">${typeof role.name === 'object' ? role.name.ar : role.name}</div>
        `;
        div.onclick = () => {
          div.classList.toggle('selected');
          if (div.classList.contains('selected')) selectedRoles.push(role);
          else selectedRoles = selectedRoles.filter(r => r.name !== role.name);
        };
        rolesGrid.appendChild(div);
      });
    }

    function renderPlayers(playersData) {
      if (!playersData || Object.keys(playersData).length === 0) {
        playersList.innerHTML = `<p style="text-align:center; color:#555;">لا يوجد لاعبون</p>`;
        return;
      }
      playersList.innerHTML = Object.values(playersData).map(p => `
        <div class="player-item">
          <span class="name">👤 ${p.name}</span>
          <span class="badge" style="color:#d4a017;">${p.role ? '✅ جاهز' : '⏳ انتظار'}</span>
        </div>
      `).join('');
    }

    listenToPlayers(roomCode, renderPlayers);

    document.getElementById('startGameBtn').onclick = async () => {
      const wolves = parseInt(document.getElementById('wolvesCount').value);
      const villagers = parseInt(document.getElementById('villagersCount').value);
      try {
        await distributeRoles(roomCode, wolves, villagers, selectedRoles);
        window.location.href = 'control.html';
      } catch (err) { alert('❌ خطأ: ' + err.message); }
    };

    document.getElementById('exitBtn').onclick = async () => {
      if (confirm('هل أنت متأكد من الخروج؟')) { await deleteRoom(roomCode); clearRoomCode(); window.location.href = 'index.html'; }
    };

    document.getElementById('refreshBtn').onclick = loadRoles;
    loadRoles();
  </script>
</body>
</html>
