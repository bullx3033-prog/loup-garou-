<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لو ڨارو - الراوي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ===== أنماط خاصة بالراوي ===== */
    .section {
      background: #1a1a1a;
      border: 1px solid crimson;
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
    }
    .section-title {
      color: crimson;
      font-size: 18px;
      margin-bottom: 10px;
      display: block;
      text-shadow: 0 0 8px red;
    }
    .btn {
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      background: #2c2c2c;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      text-align: center;
      font-size: 16px;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.1);
    }
    .btn:hover {
      background: #3a3a3a;
      box-shadow: 0 0 15px crimson;
      transform: scale(1.02);
    }
    .btn-primary {
      background: #2c2c2c;
      color: #fff;
    }
    .btn-primary:hover {
      background: #3a3a3a;
    }
    .btn-danger {
      background: #a10d0d;
      color: #fff;
    }
    .btn-danger:hover {
      background: #8b0000;
      box-shadow: 0 0 25px #8b0000;
    }
    .btn-success {
      background: #1a4a1a;
      color: #fff;
    }
    .btn-success:hover {
      background: #2e7d32;
      box-shadow: 0 0 25px #2e7d32;
    }
    input,
    select {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #555;
      background: #1a1a1a;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 16px;
    }
    input:focus,
    select:focus {
      border-color: crimson;
      outline: none;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
    }
    .hidden {
      display: none !important;
    }
    .flex {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .flex .btn {
      flex: 1;
    }

    /* ===== عدادات الذئاب والقرويين ===== */
    .counter-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin: 10px 0;
      justify-content: center;
    }
    .counter-item {
      background: #1a1a1a;
      border: 1px solid #555;
      border-radius: 10px;
      padding: 10px 15px;
      text-align: center;
      flex: 1;
      min-width: 100px;
    }
    .counter-item label {
      display: block;
      color: #ccc;
      font-size: 14px;
      margin-bottom: 5px;
    }
    .counter-item input {
      width: 60px;
      text-align: center;
      padding: 6px;
      margin: 0 auto;
      display: block;
      background: #111;
      border: 1px solid #555;
      border-radius: 6px;
      color: #fff;
      font-size: 18px;
      font-family: 'Cinzel', serif;
    }

    /* ===== قائمة اللاعبين ===== */
    .player-list {
      margin-top: 10px;
    }
    .player-item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .player-item .name {
      color: #f0e0c0;
      font-size: 16px;
    }
    .player-item .badge {
      background: #2c2c2c;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: #ccc;
    }

    .start-btn-wrapper {
      margin-top: 15px;
    }
    .start-btn-wrapper .btn {
      font-size: 20px;
      padding: 16px;
    }

    /* ===== دوائر الأدوار الإضافية ===== */
    .roles-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 15px 0;
    }
    .role-circle {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 50%;
      border: 3px solid #555;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
      overflow: hidden;
    }
    .role-circle:hover {
      border-color: crimson;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
    }
    .role-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .role-circle .placeholder {
      font-size: 40px;
      color: #555;
    }
    .role-circle .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: #a10d0d;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      z-index: 2;
    }
    .role-circle .remove-btn:hover {
      background: #8b0000;
      box-shadow: 0 0 15px #8b0000;
    }
    .role-circle .role-name-label {
      position: absolute;
      bottom: 5px;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 12px;
      text-align: center;
      padding: 2px 0;
      font-family: 'Cinzel', serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* القائمة المنسدلة المنبثقة لاختيار الدور */
    .role-select-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #1a1a1a;
      border: 1px solid crimson;
      border-radius: 8px;
      max-height: 150px;
      overflow-y: auto;
      z-index: 10;
      display: none;
      padding: 5px 0;
    }
    .role-select-dropdown.show {
      display: block;
    }
    .role-select-dropdown .option {
      padding: 8px 12px;
      cursor: pointer;
      color: #ccc;
      font-size: 14px;
      transition: 0.2s;
      font-family: 'Cinzel', serif;
    }
    .role-select-dropdown .option:hover {
      background: #2c2c2c;
      color: #fff;
    }
    .role-circle-wrapper {
      position: relative;
    }

    @media (max-width: 600px) {
      .counter-group {
        flex-direction: column;
        align-items: center;
      }
      .roles-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="hostTitle">🐺 لو ڨارو - الراوي</h2>

    <!-- ===== اختيار الأدوار الإضافية (دوائر) ===== -->
    <div class="section">
      <span class="section-title" id="extraRolesTitle">🃏 اختر الأدوار الإضافية (حد أقصى 6)</span>
      <div class="roles-grid" id="rolesGrid">
        <!-- سيتم إنشاء 6 دوائر بواسطة JavaScript -->
      </div>
      <p style="color:#777; font-size:12px; margin-top:5px;">انقر على دائرة فارغة لاختيار دور، واضغط ✕ لإزالته.</p>
    </div>

    <!-- ===== إعدادات عدد الذئاب والقرويين ===== -->
    <div class="section">
      <span class="section-title" id="roomSettingsTitle">⚙️ إعدادات الغرفة</span>
      <div class="counter-group">
        <div class="counter-item">
          <label for="wolvesCount">🐺 عدد الذئاب</label>
          <input type="number" id="wolvesCount" value="2" min="1" max="10" />
        </div>
        <div class="counter-item">
          <label for="villagersCount">👨‍🌾 عدد القرويين</label>
          <input type="number" id="villagersCount" value="3" min="1" max="20" />
        </div>
      </div>
    </div>

    <!-- ===== قائمة اللاعبين ===== -->
    <div class="section">
      <span class="section-title" id="playersTitle">👥 اللاعبون في الغرفة</span>
      <div id="playersList" class="player-list">
        <p style="color:#777; text-align:center;">لا يوجد لاعبون بعد</p>
      </div>
      <div class="flex" style="margin-top:10px;">
        <button class="btn btn-danger" id="exitBtn">🚪 خروج</button>
        <button class="btn btn-primary" id="refreshBtn">🔄 تحديث</button>
      </div>
    </div>

    <!-- ===== زر بدء اللعبة ===== -->
    <div class="start-btn-wrapper">
      <button class="btn btn-success" id="startGameBtn">🚀 بدء اللعبة</button>
    </div>
  </div>

  <script type="module">
    import { t, setLanguage, getCurrentLang, translateDynamicRole } from './translations.js';
    import {
      getRoomCode,
      setRoomCode,
      clearRoomCode,
      createOrGetRoom,
      deleteRoom,
      checkRoomExpiry,
      listenToPlayers,
      getPlayers,
      addPlayer,
      distributeRoles,
      listenToRoles,
      db,
      ref,
      update,
      remove,
      get,
      onValue
    } from "./logic.js";

    // ===== ترجمة =====
    function applyTranslations() {
      document.title = t('appName') + ' - ' + t('hostTitle');
      document.getElementById('hostTitle').textContent = `🐺 ${t('appName')} - ${t('hostTitle')}`;
      document.getElementById('extraRolesTitle').textContent = '🃏 ' + t('chooseExtraRoles');
      document.getElementById('roomSettingsTitle').textContent = '⚙️ ' + t('roomSettings');
      document.getElementById('playersTitle').textContent = '👥 ' + t('playersInRoom');
      document.getElementById('exitBtn').textContent = '🚪 ' + t('exit');
      document.getElementById('refreshBtn').textContent = '🔄 ' + t('refresh');
      document.getElementById('startGameBtn').textContent = '🚀 ' + t('startGame');

      const lang = getCurrentLang();
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.documentElement.lang = lang;
    }
    applyTranslations();

    // ===== متغيرات =====
    const roomCode = getRoomCode();
    if (!roomCode) {
      alert('لا يوجد كود غرفة، سيتم إنشاء واحدة جديدة');
      await createOrGetRoom();
      location.reload();
    }

    const valid = await checkRoomExpiry(roomCode);
    if (!valid) {
      alert('انتهت صلاحية الغرفة');
      window.location.href = 'index.html';
    }

    // ===== مراجع العناصر =====
    const rolesGrid = document.getElementById('rolesGrid');
    const playersList = document.getElementById('playersList');
    const wolvesInput = document.getElementById('wolvesCount');
    const villagersInput = document.getElementById('villagersCount');
    const startBtn = document.getElementById('startGameBtn');
    const exitBtn = document.getElementById('exitBtn');
    const refreshBtn = document.getElementById('refreshBtn');

    // ===== تحميل الأدوار من Firebase =====
    let allRoles = []; // مصفوفة من الأدوار { name: {ar,fr,en}, imageUrl, description }

    async function loadRoles() {
      try {
        const snap = await get(ref(db, 'global_roles'));
        const data = snap.val() || {};
        allRoles = Object.values(data).map(role => ({
          name: role.name,
          imageUrl: role.imageUrl || 'https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png',
          description: role.description || ''
        }));
        // تحديث القوائم المنسدلة للدوائر إذا كانت مفتوحة
        document.querySelectorAll('.role-select-dropdown').forEach(drop => {
          populateDropdown(drop);
        });
      } catch (e) {
        console.error(e);
        allRoles = [];
      }
    }

    function populateDropdown(dropdown) {
      dropdown.innerHTML = '';
      if (allRoles.length === 0) {
        const div = document.createElement('div');
        div.className = 'option';
        div.textContent = t('noCustomRoles') || 'لا توجد أدوار';
        dropdown.appendChild(div);
        return;
      }
      allRoles.forEach(role => {
        const div = document.createElement('div');
        div.className = 'option';
        const nameAr = typeof role.name === 'object' ? role.name.ar : role.name;
        div.textContent = nameAr;
        div.dataset.roleData = JSON.stringify(role);
        dropdown.appendChild(div);
      });
    }

    // ===== إنشاء 6 دوائر =====
    const MAX_ROLES = 6;
    let selectedRoles = []; // مصفوفة من الأدوار المختارة (كائنات) بحجم 6، العناصر الفارغة تكون null

    function initCircles() {
      rolesGrid.innerHTML = '';
      for (let i = 0; i < MAX_ROLES; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'role-circle-wrapper';

        const circle = document.createElement('div');
        circle.className = 'role-circle';
        circle.dataset.index = i;

        // محتوى الدائرة
        const content = document.createElement('div');
        content.className = 'circle-content';
        circle.appendChild(content);

        // زر الإزالة (يظهر فقط عند وجود دور)
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn hidden';
        removeBtn.textContent = '✕';
        removeBtn.dataset.index = i;
        circle.appendChild(removeBtn);

        // القائمة المنسدلة
        const dropdown = document.createElement('div');
        dropdown.className = 'role-select-dropdown';
        dropdown.dataset.index = i;
        circle.appendChild(dropdown);

        wrapper.appendChild(circle);
        rolesGrid.appendChild(wrapper);

        // تعبئة القائمة المنسدلة
        populateDropdown(dropdown);

        // أحداث
        circle.addEventListener('click', (e) => {
          // إذا كانت الدائرة فارغة، نفتح القائمة
          const idx = parseInt(circle.dataset.index);
          if (selectedRoles[idx] === null) {
            // أغلق أي قائمة مفتوحة أخرى
            document.querySelectorAll('.role-select-dropdown.show').forEach(d => d.classList.remove('show'));
            dropdown.classList.toggle('show');
          }
        });

        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', (e) => {
          if (!wrapper.contains(e.target)) {
            dropdown.classList.remove('show');
          }
        });

        // اختيار خيار من القائمة
        dropdown.addEventListener('click', (e) => {
          const option = e.target.closest('.option');
          if (!option) return;
          const roleData = JSON.parse(option.dataset.roleData);
          const idx = parseInt(dropdown.dataset.index);
          // تعيين الدور
          selectedRoles[idx] = roleData;
          updateCircle(idx);
          dropdown.classList.remove('show');
        });

        // زر الإزالة
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = parseInt(removeBtn.dataset.index);
          selectedRoles[idx] = null;
          updateCircle(idx);
        });

        // تهيئة الدائرة فارغة
        selectedRoles[i] = null;
        updateCircle(i);
      }
    }

    function updateCircle(index) {
      const wrapper = rolesGrid.children[index];
      const circle = wrapper.querySelector('.role-circle');
      const content = circle.querySelector('.circle-content');
      const removeBtn = circle.querySelector('.remove-btn');
      const dropdown = circle.querySelector('.role-select-dropdown');

      const role = selectedRoles[index];
      if (role) {
        // عرض الصورة واسم الدور
        const img = document.createElement('img');
        img.src = role.imageUrl || 'https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png';
        img.alt = typeof role.name === 'object' ? role.name.ar : role.name;
        content.innerHTML = '';
        content.appendChild(img);
        // إضافة اسم الدور أسفل الصورة
        const label = document.createElement('div');
        label.className = 'role-name-label';
        const nameAr = typeof role.name === 'object' ? role.name.ar : role.name;
        label.textContent = nameAr;
        content.appendChild(label);
        removeBtn.classList.remove('hidden');
        circle.style.borderColor = 'crimson';
      } else {
        // فارغة
        content.innerHTML = `<span class="placeholder">+</span>`;
        removeBtn.classList.add('hidden');
        circle.style.borderColor = '#555';
      }
      // إغلاق القائمة
      dropdown.classList.remove('show');
    }

    // ===== جلب اللاعبين وعرضهم =====
    function renderPlayers(playersData) {
      if (!playersData || Object.keys(playersData).length === 0) {
        playersList.innerHTML = `<p style="color:#777; text-align:center;">${t('noPlayers')}</p>`;
        return;
      }
      let html = '';
      Object.values(playersData).forEach(p => {
        html += `
          <div class="player-item">
            <span class="name">👤 ${p.name}</span>
            <span class="badge">${p.role ? t('role') + ': ' + translateDynamicRole(p.role) : t('waiting')}</span>
          </div>
        `;
      });
      playersList.innerHTML = html;
    }

    listenToPlayers(roomCode, (data) => {
      renderPlayers(data);
    });

    // ===== بدء اللعبة =====
    startBtn.addEventListener('click', async () => {
      const wolves = parseInt(wolvesInput.value) || 2;
      const villagers = parseInt(villagersInput.value) || 3;
      // جمع الأدوار المختارة (غير الفارغة)
      const selected = selectedRoles.filter(r => r !== null);

      if (wolves < 1) {
        alert('يجب أن يكون عدد الذئاب 1 على الأقل');
        return;
      }
      if (villagers < 1) {
        alert('يجب أن يكون عدد القرويين 1 على الأقل');
        return;
      }

      try {
        await distributeRoles(roomCode, wolves, villagers, selected);
        alert('✅ تم توزيع الأدوار بنجاح!');
        window.location.href = 'control.html';
      } catch (err) {
        alert('❌ خطأ: ' + err.message);
      }
    });

    // ===== خروج =====
    exitBtn.addEventListener('click', async () => {
      if (confirm('هل أنت متأكد من الخروج؟ سيتم حذف الغرفة.')) {
        await deleteRoom(roomCode);
        clearRoomCode();
        window.location.href = 'index.html';
      }
    });

    // ===== تحديث =====
    refreshBtn.addEventListener('click', loadRoles);

    // ===== تهيئة =====
    await loadRoles();
    initCircles();
    console.log('🚪 كود الغرفة:', roomCode);
  </script>
</body>
</html>
