<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لو ڨارو - تحكم الراوي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #0f0f0f; --panel: #1a1a1a; --gold: #d4a017; --danger: #a10d0d; }
    body { font-family: 'Cinzel', serif; background: var(--bg); color: #f0e0c0; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { max-width: 500px; width: 100%; }
    
    .info-box { background: #0d0805; border: 1px solid var(--gold); border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 20px; }
    .info-box .code { color: var(--gold); font-size: 28px; font-weight: bold; letter-spacing: 4px; }
    
    .player-card { background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
    
    .actions { display: flex; gap: 8px; }
    button { padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold; }
    .btn-kill { background: var(--danger); color: white; }
    .btn-infect { background: #1a4a1a; color: white; }
    
    #exitBtn { width: 100%; padding: 15px; background: var(--danger); color: white; margin-top: 20px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h2 style="color:crimson; text-align:center;">🐺 تحكم الراوي</h2>

    <div class="info-box">
      <div id="roomLabel">🔑 الغرفة: <span class="code" id="roomCodeDisplay">---</span></div>
      <div class="status" id="statusDisplay">⏳ جاري التحميل...</div>
      <button id="refreshBtn" style="margin-top:10px; background:#333; color:#fff;">🔄 تحديث</button>
    </div>

    <div id="players"></div>

    <button id="exitBtn">⚰️ إنهاء الجولة والخروج</button>
  </div>

  <script type="module">
    import { t, getCurrentLang } from './translations.js';
    import { getRoomCode, clearRoomCode, checkRoomExpiry, listenToPlayers, getPlayers, killPlayer, infectPlayer, deleteRoom, db, ref } from "./logic.js";

    const roomCode = getRoomCode();
    const playerContainer = document.getElementById("players");
    const roomDisplay = document.getElementById("roomCodeDisplay");
    const statusDisplay = document.getElementById("statusDisplay");
    
    if (!roomCode) { window.location.href = "host.html"; }
    roomDisplay.textContent = roomCode;

    window.killPlayer = (id) => { killPlayer(roomCode, id); };
    window.infectPlayer = (id) => { infectPlayer(roomCode, id); };

    function renderPlayers(data) {
      playerContainer.innerHTML = "";
      if (!data) { statusDisplay.textContent = "⏳ انتظار..."; return; }
      const entries = Object.entries(data);
      statusDisplay.textContent = `✅ ${entries.length} لاعب في الغرفة`;
      
      entries.forEach(([id, player]) => {
        const card = document.createElement("div");
        card.className = "player-card";
        if (player.isDead) card.style.opacity = "0.5";
        
        card.innerHTML = `
          <div style="display:flex; align-items:center; gap:10px;">
            <img src="${player.roleImage || 'https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png'}" class="avatar" />
            <div>
              <div style="font-weight:bold;">${player.name}</div>
              <div style="font-size:12px; color:#888;">${player.role || '---'}</div>
            </div>
          </div>
          <div class="actions">
            <button class="btn-kill" onclick="killPlayer('${id}')">🗡️</button>
            <button class="btn-infect" onclick="infectPlayer('${id}')">🐺</button>
          </div>
        `;
        playerContainer.appendChild(card);
      });
    }

    async function fetchPlayers() { const data = await getPlayers(roomCode); renderPlayers(data); }
    listenToPlayers(roomCode, renderPlayers);
    document.getElementById("refreshBtn").addEventListener("click", fetchPlayers);
    document.getElementById("exitBtn").addEventListener("click", async () => {
      if (!confirm('إنهاء الجولة؟')) return;
      await deleteRoom(roomCode);
      clearRoomCode();
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
