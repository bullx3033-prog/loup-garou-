<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لو ڨارو - الراوي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ===== أنماط خاصة بالراوي ===== */
    .section {
      background: #1a1a1a;
      border: 1px solid crimson;
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
    }
    .section-title {
      color: crimson;
      font-size: 18px;
      margin-bottom: 10px;
      display: block;
      text-shadow: 0 0 8px red;
    }
    .btn {
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      background: #2c2c2c;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      text-align: center;
      font-size: 16px;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.1);
    }
    .btn:hover {
      background: #3a3a3a;
      box-shadow: 0 0 15px crimson;
      transform: scale(1.02);
    }
    .btn-primary {
      background: #2c2c2c;
      color: #fff;
    }
    .btn-primary:hover {
      background: #3a3a3a;
    }
    .btn-danger {
      background: #a10d0d;
      color: #fff;
    }
    .btn-danger:hover {
      background: #8b0000;
      box-shadow: 0 0 25px #8b0000;
    }
    .btn-success {
      background: #1a4a1a;
      color: #fff;
    }
    .btn-success:hover {
      background: #2e7d32;
      box-shadow: 0 0 25px #2e7d32;
    }
    input,
    select {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #555;
      background: #1a1a1a;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 16px;
    }
    input:focus,
    select:focus {
      border-color: crimson;
      outline: none;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
    }
    .hidden {
      display: none !important;
    }
    .flex {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .flex .btn {
      flex: 1;
    }

    /* تنسيق العدادات */
    .counter-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin: 10px 0;
      justify-content: center;
    }
    .counter-item {
      background: #1a1a1a;
      border: 1px solid #555;
      border-radius: 10px;
      padding: 10px 15px;
      text-align: center;
      flex: 1;
      min-width: 100px;
    }
    .counter-item label {
      display: block;
      color: #ccc;
      font-size: 14px;
      margin-bottom: 5px;
    }
    .counter-item input {
      width: 60px;
      text-align: center;
      padding: 6px;
      margin: 0 auto;
      display: block;
      background: #111;
      border: 1px solid #555;
      border-radius: 6px;
      color: #fff;
      font-size: 18px;
      font-family: 'Cinzel', serif;
    }

    /* قائمة اللاعبين */
    .player-list {
      margin-top: 10px;
    }
    .player-item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .player-item .name {
      color: #f0e0c0;
      font-size: 16px;
    }
    .player-item .badge {
      background: #2c2c2c;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: #ccc;
    }

    /* زر بدء اللعبة */
    .start-btn-wrapper {
      margin-top: 15px;
    }
    .start-btn-wrapper .btn {
      font-size: 20px;
      padding: 16px;
    }

    /* ===== قسم الديسكورد (موجود في الأصل) ===== */
    #discordSection {
      margin-top: 20px;
    }
    #discordSection .flex {
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .counter-group {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="hostTitle">🐺 لو ڨارو - الراوي</h2>

    <!-- ===== قسم الديسكورد (الأصلي) ===== -->
    <div class="section" id="discordSection">
      <span class="section-title">🎙️ إعدادات Discord</span>
      <input type="text" id="discordLinkInput" placeholder="أضف رابط غرفة Discord" />
      <div class="flex">
        <button class="btn btn-primary" id="saveDiscordBtn">💾 حفظ الرابط</button>
        <button class="btn" id="copyDiscordBtn">📋 نسخ الرابط</button>
      </div>
      <p style="color:#777; font-size:12px; margin-top:5px;" id="discordHint">انسخ رابط الغرفة الصوتية من Discord والصقه هنا ليظهر للاعبين.</p>
    </div>

    <!-- ===== اختيار الأدوار الإضافية (الأصلي: قائمة منسدلة) ===== -->
    <div class="section">
      <span class="section-title" id="extraRolesTitle">🃏 اختر الأدوار الإضافية</span>
      <div id="rolesContainer">
        <select id="rolesSelect" multiple style="height:150px; background:#1a1a1a; color:#fff; border:1px solid #555; border-radius:8px; padding:10px; width:100%; font-family:'Cinzel',serif;">
          <option value="" disabled>جاري التحميل...</option>
        </select>
        <p style="color:#777; font-size:12px; margin-top:5px;">اضغط مع الاستمرار على Ctrl (أو Cmd) لتحديد عدة أدوار.</p>
      </div>
    </div>

    <!-- ===== إعدادات عدد الذئاب والقرويين ===== -->
    <div class="section">
      <span class="section-title" id="roomSettingsTitle">⚙️ إعدادات الغرفة</span>
      <div class="counter-group">
        <div class="counter-item">
          <label for="wolvesCount">🐺 عدد الذئاب</label>
          <input type="number" id="wolvesCount" value="2" min="1" max="10" />
        </div>
        <div class="counter-item">
          <label for="villagersCount">👨‍🌾 عدد القرويين</label>
          <input type="number" id="villagersCount" value="3" min="1" max="20" />
        </div>
      </div>
    </div>

    <!-- ===== قائمة اللاعبين ===== -->
    <div class="section">
      <span class="section-title" id="playersTitle">👥 اللاعبون في الغرفة</span>
      <div id="playersList" class="player-list">
        <p style="color:#777; text-align:center;">لا يوجد لاعبون بعد</p>
      </div>
      <div class="flex" style="margin-top:10px;">
        <button class="btn btn-danger" id="exitBtn">🚪 خروج</button>
        <button class="btn btn-primary" id="refreshBtn">🔄 تحديث</button>
      </div>
    </div>

    <!-- ===== زر بدء اللعبة ===== -->
    <div class="start-btn-wrapper">
      <button class="btn btn-success" id="startGameBtn">🚀 بدء اللعبة</button>
    </div>
  </div>

  <script type="module">
    import { t, setLanguage, getCurrentLang, translateDynamicRole } from './translations.js';
    import {
      getRoomCode,
      setRoomCode,
      clearRoomCode,
      createOrGetRoom,
      deleteRoom,
      checkRoomExpiry,
      listenToPlayers,
      getPlayers,
      addPlayer,
      distributeRoles,
      listenToRoles,
      db,
      ref,
      update,
      remove,
      get,
      onValue
    } from "./logic.js";

    // ===== ترجمة =====
    function applyTranslations() {
      document.title = t('appName') + ' - ' + t('hostTitle');
      document.getElementById('hostTitle').textContent = `🐺 ${t('appName')} - ${t('hostTitle')}`;
      document.getElementById('extraRolesTitle').textContent = '🃏 ' + t('chooseExtraRoles');
      document.getElementById('roomSettingsTitle').textContent = '⚙️ ' + t('roomSettings');
      document.getElementById('playersTitle').textContent = '👥 ' + t('playersInRoom');
      document.getElementById('discordHint').textContent = '💡 ' + t('discordHint');
      document.getElementById('saveDiscordBtn').textContent = '💾 ' + t('save');
      document.getElementById('copyDiscordBtn').textContent = '📋 ' + t('copyLink');
      document.getElementById('exitBtn').textContent = '🚪 ' + t('exit');
      document.getElementById('refreshBtn').textContent = '🔄 ' + t('refresh');
      document.getElementById('startGameBtn').textContent = '🚀 ' + t('startGame');
      document.getElementById('discordLinkInput').placeholder = t('enterDiscordLink');

      const lang = getCurrentLang();
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.documentElement.lang = lang;
    }
    applyTranslations();

    // ===== متغيرات =====
    const roomCode = getRoomCode();
    if (!roomCode) {
      alert('لا يوجد كود غرفة، سيتم إنشاء واحدة جديدة');
      await createOrGetRoom();
      location.reload();
    }

    const valid = await checkRoomExpiry(roomCode);
    if (!valid) {
      alert('انتهت صلاحية الغرفة');
      window.location.href = 'index.html';
    }

    // ===== مراجع العناصر =====
    const rolesSelect = document.getElementById('rolesSelect');
    const playersList = document.getElementById('playersList');
    const wolvesInput = document.getElementById('wolvesCount');
    const villagersInput = document.getElementById('villagersCount');
    const startBtn = document.getElementById('startGameBtn');
    const exitBtn = document.getElementById('exitBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const discordInput = document.getElementById('discordLinkInput');
    const saveDiscordBtn = document.getElementById('saveDiscordBtn');
    const copyDiscordBtn = document.getElementById('copyDiscordBtn');

    // ===== تحميل الأدوار من Firebase =====
    async function loadRoles() {
      try {
        const snap = await get(ref(db, 'global_roles'));
        const data = snap.val() || {};
        const roles = Object.values(data);
        rolesSelect.innerHTML = '';
        if (roles.length === 0) {
          rolesSelect.innerHTML = '<option value="">لا توجد أدوار مخصصة</option>';
          return;
        }
        roles.forEach(role => {
          const option = document.createElement('option');
          const nameAr = typeof role.name === 'object' ? role.name.ar : role.name;
          option.value = JSON.stringify({ name: nameAr, imageUrl: role.imageUrl || '' });
          option.textContent = nameAr;
          rolesSelect.appendChild(option);
        });
      } catch (e) {
        console.error(e);
        rolesSelect.innerHTML = '<option value="">خطأ في تحميل الأدوار</option>';
      }
    }

    // ===== جلب اللاعبين وعرضهم =====
    function renderPlayers(playersData) {
      if (!playersData || Object.keys(playersData).length === 0) {
        playersList.innerHTML = `<p style="color:#777; text-align:center;">${t('noPlayers')}</p>`;
        return;
      }
      let html = '';
      Object.values(playersData).forEach(p => {
        html += `
          <div class="player-item">
            <span class="name">👤 ${p.name}</span>
            <span class="badge">${p.role ? t('role') + ': ' + translateDynamicRole(p.role) : t('waiting')}</span>
          </div>
        `;
      });
      playersList.innerHTML = html;
    }

    listenToPlayers(roomCode, (data) => {
      renderPlayers(data);
    });

    // ===== بدء اللعبة =====
    startBtn.addEventListener('click', async () => {
      const wolves = parseInt(wolvesInput.value) || 2;
      const villagers = parseInt(villagersInput.value) || 3;
      const selectedOptions = rolesSelect.selectedOptions;
      const selected = [];
      for (let opt of selectedOptions) {
        try {
          const val = JSON.parse(opt.value);
          selected.push(val);
        } catch (e) {}
      }

      if (wolves < 1) {
        alert('يجب أن يكون عدد الذئاب 1 على الأقل');
        return;
      }
      if (villagers < 1) {
        alert('يجب أن يكون عدد القرويين 1 على الأقل');
        return;
      }

      try {
        await distributeRoles(roomCode, wolves, villagers, selected);
        alert('✅ تم توزيع الأدوار بنجاح!');
        window.location.href = 'control.html';
      } catch (err) {
        alert('❌ خطأ: ' + err.message);
      }
    });

    // ===== خروج =====
    exitBtn.addEventListener('click', async () => {
      if (confirm('هل أنت متأكد من الخروج؟ سيتم حذف الغرفة.')) {
        await deleteRoom(roomCode);
        clearRoomCode();
        window.location.href = 'index.html';
      }
    });

    // ===== تحديث =====
    refreshBtn.addEventListener('click', loadRoles);

    // ===== Discord =====
    saveDiscordBtn.addEventListener('click', async () => {
      const link = discordInput.value.trim();
      if (!link) {
        alert('الرجاء إدخال رابط صحيح');
        return;
      }
      try {
        await update(ref(db, `rooms/${roomCode}`), { discordLink: link });
        alert('✅ تم حفظ رابط Discord');
      } catch (e) {
        alert('❌ خطأ: ' + e.message);
      }
    });

    copyDiscordBtn.addEventListener('click', () => {
      const link = discordInput.value;
      if (link) {
        navigator.clipboard.writeText(link).then(() => {
          alert('📋 تم نسخ الرابط');
        }).catch(() => {
          alert('❌ تعذر النسخ');
        });
      } else {
        alert('لا يوجد رابط لنسخه');
      }
    });

    loadRoles();
    console.log('🚪 كود الغرفة:', roomCode);
  </script>
</body>
</html>
