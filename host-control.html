<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لو ڨارو - تحكم الراوي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ===== أنماط عامة ===== */
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Cinzel', serif;
      background: #000;
      background-image: radial-gradient(circle at 20% 30%, #1a0a0a 0%, #000000 100%);
      color: #f0e0c0;
      min-height: 100vh;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      max-width: 750px;
      width: 100%;
      margin: 0 auto;
      background: #111;
      border: 2px solid crimson;
      border-radius: 16px;
      padding: 25px 20px;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
    }
    h2 {
      font-size: 28px;
      color: crimson;
      text-shadow: 0 0 10px red, 0 0 20px darkred;
      text-align: center;
      border-bottom: 2px solid #222;
      padding-bottom: 12px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }
    .info-box {
      background: #0d0805;
      border: 1px solid #d4a017;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 20px;
      text-align: center;
    }
    .info-box .code {
      color: #d4a017;
      font-size: 28px;
      letter-spacing: 4px;
    }
    .info-box .status {
      color: #b8a08a;
      font-size: 14px;
      margin-top: 5px;
    }
    .refresh-btn {
      background: #b8860b;
      border: none;
      color: #0d0805;
      padding: 8px 18px;
      border-radius: 30px;
      font-family: "Cinzel", serif;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      margin-right: 10px;
      box-shadow: 0 0 15px rgba(184, 134, 11, 0.3);
    }
    .refresh-btn:hover {
      background: #d4a017;
      box-shadow: 0 0 30px #d4a017;
      transform: scale(1.05);
    }
    #exitBtn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 500px;
    }
    .infected-badge {
      background: #6b1a1a;
      color: #ff6b6b;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      border: 1px solid #ff6b6b;
      display: inline-block;
      margin-top: 2px;
    }

    /* ===== شبكة الدوائر ===== */
    .players-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 15px;
      margin-top: 10px;
      justify-items: center;
    }
    .player-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #555;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: 0.3s;
      cursor: default;
      overflow: hidden;
    }
    .player-circle .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .player-circle .dead-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: #e74c3c;
      pointer-events: none;
    }
    .player-circle .status-badge {
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 9px;
      color: #ccc;
      white-space: nowrap;
      border: 1px solid #555;
      font-family: 'Cinzel', serif;
      pointer-events: none;
    }
    .player-circle .player-name {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      padding: 1px 6px;
      border-radius: 8px;
      font-size: 9px;
      color: #f0e0c0;
      white-space: nowrap;
      border: 1px solid #333;
      font-family: 'Cinzel', serif;
      pointer-events: none;
      opacity: 0;
      transition: 0.3s;
    }
    .player-circle:hover .player-name {
      opacity: 1;
    }
    .player-circle .action-buttons {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
    }
    .player-circle:hover .action-buttons {
      opacity: 1;
      pointer-events: auto;
    }
    .player-circle .action-buttons button {
      border: none;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 10px;
      font-family: 'Cinzel', serif;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }
    .player-circle .action-buttons .kill-btn {
      background: #a10d0d;
      color: #fff;
    }
    .player-circle .action-buttons .kill-btn:hover {
      background: #8b0000;
      box-shadow: 0 0 10px #8b0000;
    }
    .player-circle .action-buttons .infect-btn {
      background: #1a4a1a;
      color: #fff;
    }
    .player-circle .action-buttons .infect-btn:hover {
      background: #2e7d32;
      box-shadow: 0 0 10px #2e7d32;
    }
    .player-circle .action-buttons .disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .player-circle.dead {
      border-color: #e74c3c;
      opacity: 0.7;
    }
    .player-circle.infected {
      border-color: #66bb6a;
      box-shadow: 0 0 15px #66bb6a;
    }
    .player-circle.selected {
      border-color: #d4a017;
      box-shadow: 0 0 20px #d4a017;
    }

    /* استجابة للشاشات الصغيرة */
    @media (max-width: 600px) {
      .players-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }
      .player-circle {
        width: 70px;
        height: 70px;
      }
    }
    @media (max-width: 400px) {
      .players-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .player-circle {
        width: 65px;
        height: 65px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="controlTitle">🐺 تحكم الراوي</h2>

    <div class="info-box">
      <div id="roomLabel">🔑 الغرفة: <span class="code" id="roomCodeDisplay">---</span></div>
      <div class="status" id="statusDisplay">⏳ جاري التحميل...</div>
      <button class="refresh-btn" id="refreshBtn">🔄 تحديث</button>
    </div>

    <div id="playersContainer">
      <div id="playersGrid" class="players-grid"></div>
    </div>

    <button class="btn btn-danger" id="exitBtn">⚰️ إنهاء الجولة والخروج</button>
  </div>

  <script type="module">
    import { t, setLanguage, getCurrentLang, translateDynamicRole } from './translations.js';
    import {
      getRoomCode,
      clearRoomCode,
      checkRoomExpiry,
      listenToPlayers,
      getPlayers,
      killPlayer,
      infectPlayer,
      deleteRoom,
      db,
      ref,
      update,
      remove,
      onValue,
      get
    } from "./logic.js";

    function applyTranslations() {
      document.title = t('appName') + ' - ' + t('controlTitle');
      document.getElementById('controlTitle').textContent = `🐺 ${t('controlTitle')}`;
      document.getElementById('refreshBtn').textContent = '🔄 ' + t('refresh');
      document.getElementById('exitBtn').textContent = '⚰️ ' + t('endRound');

      const lang = getCurrentLang();
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.documentElement.lang = lang;
    }

    applyTranslations();

    const roomCode = getRoomCode();
    const playersGrid = document.getElementById("playersGrid");
    const roomDisplay = document.getElementById("roomCodeDisplay");
    const statusDisplay = document.getElementById("statusDisplay");
    const refreshBtn = document.getElementById("refreshBtn");

    if (!roomCode) {
      roomDisplay.textContent = "⚠️ " + t('unknown');
      statusDisplay.textContent = "❌ " + t('noRoomCode');
      playersGrid.innerHTML =
        `<p style="color:#e74c3c; text-align:center; grid-column:1/-1;">❌ ${t('noRoomCode')}</p>`;
      setTimeout(() => (window.location.href = "host.html"), 2000);
      throw new Error("No roomCode");
    }

    roomDisplay.textContent = roomCode;

    const valid = await checkRoomExpiry(roomCode);
    if (!valid) {
      alert("⏰ " + t('roomExpired'));
      window.location.href = "index.html";
      throw new Error("Expired");
    }

    // ===== دوال القتل والتحويل (مع تحديث الواجهة) =====
    window.killPlayer = async (id) => {
      await killPlayer(roomCode, id);
      fetchPlayers();
    };
    window.infectPlayer = async (id) => {
      await infectPlayer(roomCode, id);
      fetchPlayers();
    };

    // ===== عرض اللاعبين على شكل دوائر =====
    function renderPlayers(data) {
      playersGrid.innerHTML = "";
      if (!data) {
        playersGrid.innerHTML = `<p style="color:#b8a08a; text-align:center; grid-column:1/-1;">📭 ${t('noPlayersInRoom')}</p>`;
        statusDisplay.textContent = "⏳ " + t('waitingPlayers');
        return;
      }
      const entries = Object.entries(data);
      if (entries.length === 0) {
        playersGrid.innerHTML = `<p style="color:#b8a08a; text-align:center; grid-column:1/-1;">📭 ${t('noPlayersInRoom')}</p>`;
        statusDisplay.textContent = "⏳ " + t('waitingPlayers');
        return;
      }
      statusDisplay.textContent = `✅ ${entries.length} ${t('playersInRoom')}`;

      entries.forEach(([id, player]) => {
        const circle = document.createElement("div");
        circle.className = "player-circle";
        if (player.isDead) circle.classList.add("dead");
        if (player.isInfected && !player.isDead) circle.classList.add("infected");

        const avatarUrl = player.roleImage || "https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png";
        const roleDisplay = translateDynamicRole(player.role) || t('unknown');

        // اسم اللاعب
        const nameSpan = document.createElement("span");
        nameSpan.className = "player-name";
        nameSpan.textContent = player.name;

        // الصورة
        const img = document.createElement("img");
        img.className = "avatar";
        img.src = avatarUrl;
        img.onerror = () => { img.src = "https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png"; };

        // حالة (ميت / مصاب)
        let statusText = roleDisplay;
        if (player.isDead) statusText = "💀 " + t('dead');
        else if (player.isInfected) statusText = "🐺 " + t('infected');

        const statusBadge = document.createElement("span");
        statusBadge.className = "status-badge";
        statusBadge.textContent = statusText;

        // طبقة الموت
        if (player.isDead) {
          const deadOverlay = document.createElement("div");
          deadOverlay.className = "dead-overlay";
          deadOverlay.textContent = "💀";
          circle.appendChild(deadOverlay);
        }

        // أزرار الإجراءات
        const actions = document.createElement("div");
        actions.className = "action-buttons";

        const killBtn = document.createElement("button");
        killBtn.className = "kill-btn";
        killBtn.textContent = "🗡️ قتل";
        killBtn.onclick = (e) => {
          e.stopPropagation();
          window.killPlayer(id);
        };

        const infectBtn = document.createElement("button");
        infectBtn.className = "infect-btn";
        infectBtn.textContent = "🐺 تحويل";
        infectBtn.onclick = (e) => {
          e.stopPropagation();
          window.infectPlayer(id);
        };

        if (player.isDead) {
          killBtn.classList.add("disabled");
          infectBtn.classList.add("disabled");
        }

        actions.appendChild(killBtn);
        actions.appendChild(infectBtn);

        circle.appendChild(nameSpan);
        circle.appendChild(img);
        circle.appendChild(statusBadge);
        circle.appendChild(actions);

        playersGrid.appendChild(circle);
      });
    }

    async function fetchPlayers() {
      const data = await getPlayers(roomCode);
      renderPlayers(data);
    }

    listenToPlayers(roomCode, (data) => {
      renderPlayers(data);
    });

    refreshBtn.addEventListener("click", fetchPlayers);
    setInterval(fetchPlayers, 5000);
    await fetchPlayers();

    document.getElementById("exitBtn").addEventListener("click", async () => {
      if (!confirm(t('confirmEndRound'))) return;
      try {
        await deleteRoom(roomCode);
      } catch (err) {
        console.error(err);
        alert("⚠️ " + t('errorOccurred'));
      }
      clearRoomCode();
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
