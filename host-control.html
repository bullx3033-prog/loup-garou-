<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لو ڨارو - تحكم الراوي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    /* ===== إخفاء أي عناصر ديسكورد ===== */
    *[class*="discord"], *[id*="discord"] { display: none !important; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cinzel', serif;
      background: #000;
      background-image: radial-gradient(circle at 20% 30%, #1a0a0a 0%, #000000 100%);
      color: #f0e0c0;
      min-height: 100vh;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      background: #111;
      border: 2px solid crimson;
      border-radius: 16px;
      padding: 25px 20px;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
    }
    h2 {
      font-size: 28px;
      color: crimson;
      text-shadow: 0 0 10px red, 0 0 20px darkred;
      text-align: center;
      border-bottom: 2px solid #222;
      padding-bottom: 12px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }
    .info-box {
      background: #0d0805;
      border: 1px solid #d4a017;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 20px;
      text-align: center;
    }
    .info-box .code {
      color: #d4a017;
      font-size: 28px;
      letter-spacing: 4px;
    }
    .info-box .status {
      color: #b8a08a;
      font-size: 14px;
      margin-top: 5px;
    }
    .refresh-btn {
      background: #b8860b;
      border: none;
      color: #0d0805;
      padding: 8px 18px;
      border-radius: 30px;
      font-family: "Cinzel", serif;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      margin-right: 10px;
      box-shadow: 0 0 15px rgba(184, 134, 11, 0.3);
    }
    .refresh-btn:hover {
      background: #d4a017;
      box-shadow: 0 0 30px #d4a017;
      transform: scale(1.05);
    }
    #exitBtn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 500px;
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      background: #a10d0d;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-size: 16px;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.1);
    }
    #exitBtn:hover {
      background: #8b0000;
      box-shadow: 0 0 25px #8b0000;
    }
    .infected-badge {
      background: #6b1a1a;
      color: #ff6b6b;
      padding: 1px 8px;
      border-radius: 12px;
      font-size: 10px;
      border: 1px solid #ff6b6b;
      margin-right: 5px;
      display: inline-block;
    }

    /* ===== حاوية اللاعبين ===== */
    #players {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 80px;
    }

    /* ===== البطاقة الجديدة (رفيعة جداً) ===== */
    .player-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 3px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: 0.3s;
      min-height: 38px;
      height: 38px;
    }
    .player-card:hover {
      border-color: crimson;
      box-shadow: 0 0 8px rgba(255, 0, 0, 0.2);
    }
    .player-card.dead {
      opacity: 0.4;
      border-color: #555;
      background: #111;
    }

    /* ===== الجهة اليمنى (صورة + اسم + دور) ===== */
    .player-card .info {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
      height: 100%;
    }
    .player-card .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid crimson;
      object-fit: cover;
      background: #0d0805;
      flex-shrink: 0;
    }
    .player-card .details {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-card .details .name {
      font-size: 14px;
      color: #f2f2f2;
      font-weight: 700;
    }
    .player-card .details .role {
      font-size: 11px;
      color: #aaa;
    }
    .player-card .details .role strong {
      color: #fff;
    }

    /* ===== الجهة اليسرى (أزرار صغيرة) ===== */
    .player-card .actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .player-card .actions button {
      padding: 2px 8px;
      border: none;
      border-radius: 4px;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      font-size: 10px;
      cursor: pointer;
      transition: 0.3s;
      background: #2c2c2c;
      color: #fff;
      white-space: nowrap;
      height: 24px;
      line-height: 1;
    }
    .player-card .actions button:hover {
      transform: scale(1.05);
    }
    .player-card .actions .kill {
      background: #6b1a1a;
      color: #fff;
    }
    .player-card .actions .kill:hover {
      background: #8b0000;
      box-shadow: 0 0 12px #8b0000;
    }
    .player-card .actions .infect {
      background: #1a4a1a;
      color: #fff;
    }
    .player-card .actions .infect:hover {
      background: #2e7d32;
      box-shadow: 0 0 12px #2e7d32;
    }
    .player-card.dead .actions button {
      opacity: 0.3;
      pointer-events: none;
    }

    /* ===== التجاوب للشاشات الصغيرة ===== */
    @media (max-width: 500px) {
      .player-card {
        height: auto;
        min-height: 44px;
        padding: 6px 8px;
        flex-wrap: wrap;
        gap: 4px;
      }
      .player-card .info {
        flex: 1 1 100%;
      }
      .player-card .actions {
        flex: 1 1 100%;
        justify-content: flex-start;
        gap: 8px;
      }
      .player-card .actions button {
        flex: 1;
        text-align: center;
        font-size: 12px;
        height: 30px;
        padding: 4px 10px;
      }
      .player-card .avatar {
        width: 24px;
        height: 24px;
      }
      .player-card .details .name {
        font-size: 13px;
      }
      .player-card .details .role {
        font-size: 10px;
      }
    }
    @media (max-width: 380px) {
      .player-card .avatar {
        width: 20px;
        height: 20px;
      }
      .player-card .details .name {
        font-size: 12px;
      }
      .player-card .details .role {
        font-size: 9px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="controlTitle">🐺 تحكم الراوي</h2>

    <div class="info-box">
      <div id="roomLabel">🔑 الغرفة: <span class="code" id="roomCodeDisplay">---</span></div>
      <div class="status" id="statusDisplay">⏳ جاري التحميل...</div>
      <button class="refresh-btn" id="refreshBtn">🔄 تحديث</button>
    </div>

    <div id="players"></div>

    <button id="exitBtn">⚰️ إنهاء الجولة والخروج</button>
  </div>

  <script type="module">
    import { t, setLanguage, getCurrentLang, translateDynamicRole } from './translations.js';
    import {
      getRoomCode,
      clearRoomCode,
      checkRoomExpiry,
      listenToPlayers,
      getPlayers,
      killPlayer,
      infectPlayer,
      deleteRoom,
    } from "./logic.js";

    // ===== ترجمة =====
    function applyTranslations() {
      document.title = t('appName') + ' - ' + t('controlTitle');
      document.getElementById('controlTitle').textContent = `🐺 ${t('controlTitle')}`;
      document.getElementById('refreshBtn').textContent = '🔄 ' + t('refresh');
      document.getElementById('exitBtn').textContent = '⚰️ ' + t('endRound');

      const lang = getCurrentLang();
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.documentElement.lang = lang;
    }
    applyTranslations();

    // ===== متغيرات =====
    const roomCode = getRoomCode();
    const playerContainer = document.getElementById("players");
    const roomDisplay = document.getElementById("roomCodeDisplay");
    const statusDisplay = document.getElementById("statusDisplay");
    const refreshBtn = document.getElementById("refreshBtn");

    if (!roomCode) {
      roomDisplay.textContent = "⚠️ " + t('unknown');
      statusDisplay.textContent = "❌ " + t('noRoomCode');
      playerContainer.innerHTML =
        `<p style="color:#e74c3c; text-align:center;">❌ ${t('noRoomCode')}</p>`;
      setTimeout(() => (window.location.href = "host.html"), 2000);
      throw new Error("No roomCode");
    }

    roomDisplay.textContent = roomCode;

    const valid = await checkRoomExpiry(roomCode);
    if (!valid) {
      alert("⏰ " + t('roomExpired'));
      window.location.href = "index.html";
      throw new Error("Expired");
    }

    // ===== دوال القتل والتحويل =====
    window.killPlayer = (id) => {
      killPlayer(roomCode, id);
      fetchPlayers();
    };
    window.infectPlayer = (id) => {
      infectPlayer(roomCode, id);
      fetchPlayers();
    };

    // ===== عرض اللاعبين =====
    function renderPlayers(data) {
      playerContainer.innerHTML = "";
      if (!data || Object.keys(data).length === 0) {
        playerContainer.innerHTML = `<p style="color:#b8a08a; text-align:center;">📭 ${t('noPlayersInRoom')}</p>`;
        statusDisplay.textContent = "⏳ " + t('waitingPlayers');
        return;
      }
      const entries = Object.entries(data);
      statusDisplay.textContent = `✅ ${entries.length} ${t('playersInRoom')}`;

      entries.forEach(([id, player]) => {
        const card = document.createElement("div");
        card.className = "player-card";
        if (player.isDead) card.classList.add("dead");

        const avatarUrl = player.roleImage || "https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png";
        const infectedBadge = player.isInfected && !player.isDead
          ? `<span class="infected-badge">🐺 ${t('infected')}</span>`
          : "";
        const roleDisplay = translateDynamicRole(player.role) || t('unknown');

        card.innerHTML = `
          <div class="info">
            <img src="${avatarUrl}" class="avatar" onerror="this.src='https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png'" />
            <div class="details">
              <span class="name">${player.name} ${infectedBadge}</span>
              <span class="role">${t('role')}: <strong>${roleDisplay}</strong></span>
            </div>
          </div>
          <div class="actions">
            <button class="kill" onclick="killPlayer('${id}')">🗡️ ${t('kill')}</button>
            <button class="infect" onclick="infectPlayer('${id}')">🐺 ${t('infect')}</button>
          </div>
        `;

        playerContainer.appendChild(card);
      });
    }

    async function fetchPlayers() {
      const data = await getPlayers(roomCode);
      renderPlayers(data);
    }

    // ===== استماع للتغييرات =====
    listenToPlayers(roomCode, (data) => {
      renderPlayers(data);
    });

    refreshBtn.addEventListener("click", fetchPlayers);
    setInterval(fetchPlayers, 5000);
    await fetchPlayers();

    // ===== زر الخروج =====
    document.getElementById("exitBtn").addEventListener("click", async () => {
      if (!confirm(t('confirmEndRound'))) return;
      try {
        await deleteRoom(roomCode);
      } catch (err) {
        console.error(err);
        alert("⚠️ " + t('errorOccurred'));
      }
      clearRoomCode();
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
