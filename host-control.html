<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لو ڨارو - تحكم الراوي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *[class*="discord"], *[id*="discord"] { display: none !important; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cinzel', serif;
      background: #000;
      background-image: radial-gradient(circle at 20% 30%, #1a0a0a 0%, #000000 100%);
      color: #f0e0c0;
      min-height: 100vh;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      background: #111;
      border: 2px solid crimson;
      border-radius: 16px;
      padding: 25px 20px;
      padding-bottom: 100px;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
    }
    h2 {
      font-size: 28px;
      color: crimson;
      text-shadow: 0 0 10px red, 0 0 20px darkred;
      text-align: center;
      border-bottom: 2px solid #222;
      padding-bottom: 12px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }
    .info-box {
      background: #0d0805;
      border: 1px solid #d4a017;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 20px;
      text-align: center;
    }
    .info-box .code {
      color: #d4a017;
      font-size: 28px;
      letter-spacing: 4px;
    }
    .info-box .status {
      color: #b8a08a;
      font-size: 14px;
      margin-top: 5px;
    }
    .refresh-btn {
      background: #b8860b;
      border: none;
      color: #0d0805;
      padding: 8px 18px;
      border-radius: 30px;
      font-family: "Cinzel", serif;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      margin-right: 10px;
      box-shadow: 0 0 15px rgba(184, 134, 11, 0.3);
    }
    .refresh-btn:hover {
      background: #d4a017;
      box-shadow: 0 0 30px #d4a017;
      transform: scale(1.05);
    }

    .day-night-toggle {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Cinzel', serif;
      margin-bottom: 15px;
      text-align: center;
    }
    .day-night-toggle.day {
      background: #4a3a0a;
      color: #d4a017;
      border: 2px solid #d4a017;
      box-shadow: 0 0 20px rgba(212, 160, 23, 0.2);
    }
    .day-night-toggle.day:hover {
      background: #6a5a1a;
      box-shadow: 0 0 30px rgba(212, 160, 23, 0.4);
    }
    .day-night-toggle.night {
      background: #1a1a4a;
      color: #4a4aff;
      border: 2px solid #4a4aff;
      box-shadow: 0 0 20px rgba(74, 74, 255, 0.2);
    }
    .day-night-toggle.night:hover {
      background: #2a2a6a;
      box-shadow: 0 0 30px rgba(74, 74, 255, 0.4);
    }

    #exitBtn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 500px;
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      background: #a10d0d;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-size: 16px;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.1);
      z-index: 100;
    }
    #exitBtn:hover { background: #8b0000; box-shadow: 0 0 25px #8b0000; }
    
    .infected-badge {
      background: #6b1a1a;
      color: #ff6b6b;
      padding: 1px 8px;
      border-radius: 12px;
      font-size: 10px;
      border: 1px solid #ff6b6b;
      margin-right: 5px;
      display: inline-block;
    }
    .wolf-badge {
      background: #1a3a1a;
      color: #66bb6a;
      padding: 1px 8px;
      border-radius: 12px;
      font-size: 10px;
      border: 1px solid #66bb6a;
      margin-right: 5px;
      display: inline-block;
    }
    .convertible-badge {
      background: #4a3a0a;
      color: #d4a017;
      padding: 1px 8px;
      border-radius: 12px;
      font-size: 10px;
      border: 1px solid #d4a017;
      margin-right: 5px;
      display: inline-block;
    }

    #players {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 10px;
    }

    .player-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 3px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: 0.3s;
      min-height: 38px;
      height: 38px;
    }
    .player-card:hover { border-color: crimson; box-shadow: 0 0 8px rgba(255, 0, 0, 0.2); }
    .player-card.dead { opacity: 0.4; border-color: #555; background: #111; }
    .player-card .info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; height: 100%; }
    .player-card .avatar { width: 28px; height: 28px; border-radius: 50%; border: 2px solid crimson; object-fit: cover; background: #0d0805; flex-shrink: 0; }
    .player-card .details { display: flex; align-items: center; gap: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-card .details .name { font-size: 14px; color: #f2f2f2; font-weight: 700; }
    .player-card .details .role { font-size: 11px; color: #aaa; }
    .player-card .details .role strong { color: #fff; }

    .player-card .actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .player-card .actions button {
      padding: 2px 8px;
      border: none;
      border-radius: 4px;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      font-size: 10px;
      cursor: pointer;
      transition: 0.3s;
      background: #2c2c2c;
      color: #fff;
      white-space: nowrap;
      height: 24px;
      line-height: 1;
    }
    .player-card .actions button:hover:not(:disabled) { transform: scale(1.05); }
    .player-card .actions .kill { background: #6b1a1a; color: #fff; }
    .player-card .actions .kill:hover:not(:disabled) { background: #8b0000; box-shadow: 0 0 12px #8b0000; }
    .player-card .actions .infect { background: #1a4a1a; color: #fff; }
    .player-card .actions .infect:hover:not(:disabled) { background: #2e7d32; box-shadow: 0 0 12px #2e7d32; }
    .player-card .actions .convert-to-wolf {
      background: #4a3a0a;
      color: #d4a017;
      border: 1px solid #d4a017;
    }
    .player-card .actions .convert-to-wolf:hover:not(:disabled) {
      background: #6a5a1a;
      box-shadow: 0 0 12px #d4a017;
    }
    .player-card .actions .message-btn {
      background: #b8860b;
      color: #fff;
    }
    .player-card .actions .message-btn:hover:not(:disabled) {
      background: #d4a017;
      box-shadow: 0 0 12px #d4a017;
    }
    .player-card .actions button:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }
    .player-card.dead .actions button { opacity: 0.3; pointer-events: none; }

    #messagesContainer {
      margin-top: 10px;
      background: #0d0805;
      border: 1px solid #d4a017;
      border-radius: 12px;
      padding: 12px;
      touch-action: none;
    }
    #messagesContainer .title {
      color: #d4a017;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    #messagesContainer .title .badge {
      background: #d4a017;
      color: #0d0805;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
    #messagesContainer .title .clear-btn {
      background: #6b1a1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 12px;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      cursor: pointer;
      transition: 0.3s;
    }
    #messagesContainer .title .clear-btn:hover {
      background: #8b0000;
      box-shadow: 0 0 15px #8b0000;
    }

    .messages-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #messagesList {
      flex: 1;
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-left: 4px;
      touch-action: pan-y;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scroll-behavior: smooth;
      scrollbar-width: thin;
    }
    #messagesList::-webkit-scrollbar { width: 4px; }
    #messagesList::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 10px; }
    #messagesList::-webkit-scrollbar-thumb { background: #d4a017; border-radius: 10px; }

    .scroll-btn {
      background: #2c2c2c;
      border: 1px solid #d4a017;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      min-width: 44px;
      color: #d4a017;
      font-size: 22px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      touch-action: manipulation;
      user-select: none;
      box-shadow: 0 0 15px rgba(212, 160, 23, 0.1);
      flex-shrink: 0;
    }
    .scroll-btn:hover { background: #3a3a3a; box-shadow: 0 0 25px rgba(212, 160, 23, 0.3); transform: scale(1.05); }
    .scroll-btn:active { transform: scale(0.95); }
    .scroll-btn.up { margin-bottom: auto; }
    .scroll-btn.down { margin-top: auto; }
    .scroll-buttons { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }

    .message-item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .message-item .sender {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #d4a017;
      font-size: 12px;
      font-weight: bold;
      min-width: 70px;
    }
    .message-item .sender-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #d4a017;
      object-fit: cover;
      background: #1a1a1a;
      flex-shrink: 0;
    }
    .message-item .sender .role-tag {
      color: #aaa;
      font-size: 10px;
      font-weight: normal;
      background: #1a1a1a;
      padding: 0 6px;
      border-radius: 10px;
      border: 1px solid #333;
    }
    .message-item .sender .narrator-tag {
      color: #d4a017;
      font-size: 10px;
      font-weight: normal;
      background: #2a1a0a;
      padding: 0 6px;
      border-radius: 10px;
      border: 1px solid #d4a017;
    }
    .message-item .text {
      color: #ccc;
      font-size: 13px;
      flex: 1;
      min-width: 100px;
    }
    .message-item .time {
      color: #777;
      font-size: 10px;
      min-width: 50px;
      text-align: left;
      font-feature-settings: "tnum";
      direction: ltr;
    }
    .message-item .delete-msg {
      background: #6b1a1a;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 2px 8px;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .message-item .delete-msg:hover { background: #8b0000; box-shadow: 0 0 10px #8b0000; }
    .no-messages { color: #777; font-size: 13px; text-align: center; padding: 15px 10px; font-style: italic; }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #111;
      border: 2px solid crimson;
      border-radius: 16px;
      padding: 30px 25px;
      max-width: 400px;
      width: 90%;
      color: #fff;
    }
    .modal-content h3 { color: #d4a017; font-size: 20px; margin-bottom: 10px; text-align: center; }
    .modal-content p { color: #aaa; font-size: 13px; margin-bottom: 10px; text-align: center; }
    .modal-content textarea {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #555;
      background: #1a1a1a; color: #fff; font-family: 'Cinzel', serif; font-size: 14px;
      resize: vertical; min-height: 80px;
    }
    .modal-content textarea:focus { border-color: #d4a017; outline: none; box-shadow: 0 0 15px rgba(212, 160, 23, 0.2); }
    .modal-content .flex { display: flex; gap: 10px; margin-top: 10px; }
    .modal-content .flex .btn {
      flex: 1; padding: 10px; border-radius: 8px; border: none;
      font-family: 'Cinzel', serif; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s;
    }
    .modal-content .flex .btn-success { background: #1a4a1a; color: #fff; }
    .modal-content .flex .btn-success:hover { background: #2e7d32; box-shadow: 0 0 15px #2e7d32; }
    .modal-content .flex .btn-cancel { background: #2c2c2c; color: #fff; }
    .modal-content .flex .btn-cancel:hover { background: #3a3a3a; }
    .modal-content .status-msg { color: #7a4e2d; font-size: 13px; margin-top: 8px; text-align: center; }

    @media (max-width: 500px) {
      .container { padding-bottom: 80px; }
      .player-card { height: auto; min-height: 44px; padding: 6px 8px; flex-wrap: wrap; gap: 4px; }
      .player-card .info { flex: 1 1 100%; }
      .player-card .actions { flex: 1 1 100%; justify-content: flex-start; gap: 8px; }
      .player-card .actions button { flex: 1; text-align: center; font-size: 12px; height: 30px; padding: 4px 10px; }
      .player-card .avatar { width: 24px; height: 24px; }
      .player-card .details .name { font-size: 13px; }
      .player-card .details .role { font-size: 10px; }
      #messagesList { max-height: 150px; }
      .message-item { flex-wrap: wrap; gap: 4px; }
      .message-item .sender { min-width: 60px; font-size: 11px; }
      .message-item .sender-avatar { width: 24px; height: 24px; }
      .message-item .text { font-size: 12px; width: 100%; order: 3; }
      .message-item .time { font-size: 9px; min-width: 50px; }
      .scroll-btn { width: 38px; height: 38px; min-width: 38px; font-size: 18px; }
      .day-night-toggle { font-size: 15px; padding: 12px; }
    }
    @media (max-width: 380px) {
      .player-card .avatar { width: 20px; height: 20px; }
      .player-card .details .name { font-size: 12px; }
      .player-card .details .role { font-size: 9px; }
      #messagesList { max-height: 120px; }
      .message-item .sender-avatar { width: 20px; height: 20px; }
      .scroll-btn { width: 34px; height: 34px; min-width: 34px; font-size: 16px; }
      .day-night-toggle { font-size: 13px; padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="controlTitle">🐺 تحكم الراوي</h2>

    <button class="day-night-toggle day" id="dayNightToggle">☀️ أنت في النهار</button>

    <div class="info-box">
      <div id="roomLabel">🔑 الغرفة: <span class="code" id="roomCodeDisplay">---</span></div>
      <div class="status" id="statusDisplay">⏳ جاري التحميل...</div>
      <button class="refresh-btn" id="refreshBtn">🔄 تحديث</button>
    </div>

    <div id="players"></div>

    <div id="messagesContainer">
      <div class="title">
        <span>📩 رسائل اللاعبين</span>
        <span class="badge" id="messagesCount">0</span>
        <button class="clear-btn" id="clearMessagesBtn">🗑️ مسح الكل</button>
      </div>
      <div class="messages-wrapper">
        <div id="messagesList">
          <div class="no-messages">📭 لا توجد رسائل من اللاعبين</div>
        </div>
        <div class="scroll-buttons">
          <button class="scroll-btn up" id="scrollUpBtn" title="تمرير للأعلى">▲</button>
          <button class="scroll-btn down" id="scrollDownBtn" title="تمرير للأسفل">▼</button>
        </div>
      </div>
    </div>

    <button id="exitBtn">⚰️ إنهاء الجولة والخروج</button>
  </div>

  <div class="modal" id="messageModal">
    <div class="modal-content">
      <h3 id="modalTitle">📩 إرسال رسالة</h3>
      <p id="modalSubtitle">إلى: <span id="targetPlayerName">---</span></p>
      <textarea id="messageInput" placeholder="اكتب رسالتك هنا..."></textarea>
      <div class="flex">
        <button class="btn btn-success" id="sendMessageBtn">📤 إرسال</button>
        <button class="btn btn-cancel" id="closeMessageModal">إلغاء</button>
      </div>
      <p class="status-msg" id="modalStatus"></p>
      <input type="hidden" id="targetPlayerId" value="" />
    </div>
  </div>

  <script type="module">
    import { t, setLanguage, getCurrentLang, translateDynamicRole } from './translations.js';
    import {
      getRoomCode,
      clearRoomCode,
      checkRoomExpiry,
      listenToPlayers,
      getPlayers,
      killPlayer,
      infectPlayer,
      deleteRoom,
      db,
      ref,
      remove,
      onValue,
      push,
      update,
      get,
      getPlayer,
      clearWolfMessages,
      convertToWolf,
      isPlayerWolf
    } from "./logic.js";

    function applyTranslations() {
      document.title = t('appName') + ' - ' + t('controlTitle');
      document.getElementById('controlTitle').textContent = `🐺 ${t('controlTitle')}`;
      document.getElementById('refreshBtn').textContent = '🔄 ' + t('refresh');
      document.getElementById('exitBtn').textContent = '⚰️ ' + t('endRound');

      const lang = getCurrentLang();
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.documentElement.lang = lang;
    }
    applyTranslations();

    const roomCode = getRoomCode();
    console.log('🔑 roomCode من localStorage:', roomCode);

    const playerContainer = document.getElementById("players");
    const roomDisplay = document.getElementById("roomCodeDisplay");
    const statusDisplay = document.getElementById("statusDisplay");
    const refreshBtn = document.getElementById("refreshBtn");
    const messagesList = document.getElementById("messagesList");
    const messagesCount = document.getElementById("messagesCount");
    const clearMessagesBtn = document.getElementById("clearMessagesBtn");
    const scrollUpBtn = document.getElementById("scrollUpBtn");
    const scrollDownBtn = document.getElementById("scrollDownBtn");
    const dayNightToggle = document.getElementById("dayNightToggle");

    const messageModal = document.getElementById("messageModal");
    const targetPlayerName = document.getElementById("targetPlayerName");
    const targetPlayerId = document.getElementById("targetPlayerId");
    const messageInput = document.getElementById("messageInput");
    const sendMessageBtn = document.getElementById("sendMessageBtn");
    const closeMessageModal = document.getElementById("closeMessageModal");
    const modalStatus = document.getElementById("modalStatus");

    if (!roomCode) {
      roomDisplay.textContent = "⚠️ " + t('unknown');
      statusDisplay.textContent = "❌ " + t('noRoomCode');
      playerContainer.innerHTML =
        `<p style="color:#e74c3c; text-align:center;">❌ ${t('noRoomCode')}</p>`;
      setTimeout(() => (window.location.href = "host.html"), 2000);
      throw new Error("No roomCode");
    }

    roomDisplay.textContent = roomCode;
    statusDisplay.textContent = "⏳ جاري التحميل...";

    const valid = await checkRoomExpiry(roomCode);
    if (!valid) {
      alert("⏰ " + t('roomExpired'));
      window.location.href = "index.html";
      throw new Error("Expired");
    }

    let isNight = false;

    async function updateGameState(nightMode) {
      isNight = nightMode;
      await update(ref(db, `rooms/${roomCode}/gameState`), { isNight: nightMode });
      
      if (nightMode) {
        dayNightToggle.textContent = '🌙 أنت في الليل';
        dayNightToggle.className = 'day-night-toggle night';
      } else {
        dayNightToggle.textContent = '☀️ أنت في النهار';
        dayNightToggle.className = 'day-night-toggle day';
      }
    }

    dayNightToggle.addEventListener('click', async () => {
      const newState = !isNight;
      await updateGameState(newState);
      if (newState) {
        alert('🌙 حل الليل! الذئاب تستيقظ...');
      } else {
        await clearWolfMessages(roomCode);
        alert('☀️ حل النهار!');
      }
    });

    function listenToGameState(roomCode) {
      const stateRef = ref(db, `rooms/${roomCode}/gameState`);
      onValue(stateRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
          updateGameState(data.isNight === true);
        }
      });
    }
    listenToGameState(roomCode);

    window.killPlayer = (id) => {
      killPlayer(roomCode, id);
      fetchPlayers();
    };

    window.infectPlayer = (id, playerName) => {
      const confirmMessage = `⚠️ ${t('confirmInfect')} "${playerName || t('unknown')}"؟\n${t('irreversible')}`;
      if (confirm(confirmMessage)) {
        infectPlayer(roomCode, id);
        convertToWolf(roomCode, id);
        fetchPlayers();
        alert(`✅ تم تحويل ${playerName || 'اللاعب'} إلى ذئب وأضيف إلى دردشة الذئاب!`);
      }
    };

    window.convertToWolfHandler = async (id, playerName) => {
      const confirmMessage = `⚠️ هل أنت متأكد من تحويل "${playerName || t('unknown')}" إلى ذئب؟\nهذا الدور قابل للتحويل (مثل فتى البريه).`;
      if (confirm(confirmMessage)) {
        try {
          await convertToWolf(roomCode, id);
          fetchPlayers();
          alert(`✅ تم تحويل ${playerName || 'اللاعب'} إلى ذئب وأضيف إلى دردشة الذئاب!`);
        } catch (err) {
          alert('❌ ' + t('errorOccurred') + ': ' + err.message);
        }
      }
    };

    window.sendMessageToPlayer = (playerId, playerName) => {
      targetPlayerId.value = playerId;
      targetPlayerName.textContent = playerName || 'لاعب مجهول';
      document.getElementById('modalSubtitle').textContent = 'إلى: ' + (playerName || 'لاعب مجهول');
      messageInput.value = '';
      modalStatus.textContent = '';
      messageModal.style.display = 'flex';
    };

    let playersData = {};
    let rolesData = {};

    async function loadRolesData() {
      const snap = await get(ref(db, 'global_roles'));
      rolesData = snap.val() || {};
    }
    await loadRolesData();

    function isRoleConvertible(role) {
      if (!role) return false;
      for (const key in rolesData) {
        const r = rolesData[key];
        const roleName = typeof r.name === 'object' ? r.name.ar : r.name;
        const playerRoleName = typeof role === 'object' ? role.ar : role;
        if (roleName === playerRoleName || roleName === role) {
          return r.isConvertible === true;
        }
      }
      return false;
    }

    function formatTime(timestamp) {
      if (!timestamp) return '--:--';
      const date = new Date(timestamp);
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      return hours + ':' + minutes;
    }

    function renderMessages(messagesData) {
      messagesList.innerHTML = '';
      if (!messagesData || Object.keys(messagesData).length === 0) {
        messagesList.innerHTML = `<div class="no-messages">📭 لا توجد رسائل من اللاعبين</div>`;
        messagesCount.textContent = '0';
        return;
      }

      const filteredEntries = Object.entries(messagesData)
        .filter(([key, msg]) => !msg.fromNarrator)
        .sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

      messagesCount.textContent = filteredEntries.length;

      if (filteredEntries.length === 0) {
        messagesList.innerHTML = `<div class="no-messages">📭 لا توجد رسائل من اللاعبين</div>`;
        return;
      }

      filteredEntries.forEach(([key, msg]) => {
        const div = document.createElement('div');
        div.className = 'message-item';

        const player = playersData[msg.playerId] || {};
        const playerName = player.name || msg.playerName || 'لاعب مجهول';
        const roleDisplay = translateDynamicRole(player.role) || t('unknown');
        const roleImage = player.roleImage || 'https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png';
        
        const senderHTML = `
          <span class="sender">
            <img src="${roleImage}" class="sender-avatar" onerror="this.src='https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png'" />
            ${playerName}
            <span class="role-tag">🎭 ${roleDisplay}</span>
          </span>
        `;

        const time = formatTime(msg.timestamp);
        const isWolfVote = msg.isWolfVote === true;
        const textStyle = isWolfVote ? 'color:#ff6b6b;' : '';

        // تغيير العبارة من "الذئاب تريد قتل:" إلى "قرار الذئاب:"
        let displayMessage = msg.message;
        if (isWolfVote && displayMessage.includes('الذئاب تريد قتل:')) {
          displayMessage = displayMessage.replace('الذئاب تريد قتل:', '🐺 قرار الذئاب:');
        }

        div.innerHTML = `
          ${senderHTML}
          <span class="text" style="${textStyle}">💬 ${displayMessage}</span>
          <span class="time">🕒 ${time}</span>
          <button class="delete-msg" data-key="${key}">✕</button>
        `;

        if (isWolfVote) {
          div.style.borderColor = '#ff1a1a';
          div.style.borderWidth = '2px';
        }

        const deleteBtn = div.querySelector('.delete-msg');
        deleteBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (confirm('حذف هذه الرسالة؟')) {
            await remove(ref(db, `rooms/${roomCode}/messages/${key}`));
          }
        });

        messagesList.appendChild(div);
      });
    }

    function listenToMessages(roomCode) {
      const messagesRef = ref(db, `rooms/${roomCode}/messages`);
      onValue(messagesRef, (snapshot) => {
        const data = snapshot.val();
        renderMessages(data);
      });
    }

    clearMessagesBtn.addEventListener('click', async () => {
      if (confirm('⚠️ هل أنت متأكد من مسح جميع الرسائل؟')) {
        await remove(ref(db, `rooms/${roomCode}/messages`));
      }
    });

    scrollUpBtn.addEventListener('click', () => {
      messagesList.scrollBy({ top: -80, behavior: 'smooth' });
    });
    scrollDownBtn.addEventListener('click', () => {
      messagesList.scrollBy({ top: 80, behavior: 'smooth' });
    });

    function renderPlayers(data) {
      console.log('👥 عرض اللاعبين:', data);
      playerContainer.innerHTML = "";
      if (!data || Object.keys(data).length === 0) {
        playerContainer.innerHTML = `<p style="color:#b8a08a; text-align:center;">📭 ${t('noPlayersInRoom')}</p>`;
        statusDisplay.textContent = "⏳ " + t('waitingPlayers');
        playersData = {};
        return;
      }

      playersData = data;

      const entries = Object.entries(data);
      statusDisplay.textContent = `✅ ${entries.length} ${t('playersInRoom')}`;

      const infectedPlayer = entries.find(([id, p]) => p.isInfected && !p.isDead);

      entries.forEach(([id, player]) => {
        const card = document.createElement("div");
        card.className = "player-card";
        if (player.isDead) card.classList.add("dead");

        const avatarUrl = player.roleImage || "https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png";
        
        let badge = '';
        if (player.isInfected && !player.isDead) {
          badge = `<span class="infected-badge">🐺 ${t('infected')}</span>`;
        } else if (player.isWolf && !player.isDead) {
          badge = `<span class="wolf-badge">🐺 ${t('role_wolf')}</span>`;
        }
        
        const convertible = isRoleConvertible(player.role);
        if (convertible && !player.isDead && !player.isInfected && !player.isWolf) {
          badge += `<span class="convertible-badge">🔄 قابل للتحويل</span>`;
        }

        const roleDisplay = translateDynamicRole(player.role) || t('unknown');

        let actionsHTML = `
          <button class="kill" data-id="${id}">🗡️ ${t('kill')}</button>
          <button class="infect" data-id="${id}">🐺 ${t('infect')}</button>
        `;

        if (convertible && !player.isDead && !player.isInfected && !player.isWolf) {
          actionsHTML += `<button class="convert-to-wolf" data-id="${id}">🔄 تحويل إلى ذئب</button>`;
        }

        actionsHTML += `<button class="message-btn" data-id="${id}" data-name="${player.name}">📩</button>`;

        card.innerHTML = `
          <div class="info">
            <img src="${avatarUrl}" class="avatar" onerror="this.src='https://i.postimg.cc/wBjJYYVX/Carte-Simple-Villaegois.png'" />
            <div class="details">
              <span class="name">${player.name} ${badge}</span>
              <span class="role">${t('role')} <strong>${roleDisplay}</strong></span>
            </div>
          </div>
          <div class="actions">
            ${actionsHTML}
          </div>
        `;

        const killBtn = card.querySelector('.kill');
        const infectBtn = card.querySelector('.infect');
        const convertBtn = card.querySelector('.convert-to-wolf');
        const messageBtn = card.querySelector('.message-btn');

        killBtn.addEventListener('click', () => {
          window.killPlayer(id);
        });

        infectBtn.addEventListener('click', () => {
          window.infectPlayer(id, player.name);
        });

        if (convertBtn) {
          convertBtn.addEventListener('click', () => {
            window.convertToWolfHandler(id, player.name);
          });
        }

        messageBtn.addEventListener('click', () => {
          window.sendMessageToPlayer(id, player.name);
        });

        if (infectedPlayer && infectedPlayer[0] !== id) {
          infectBtn.disabled = true;
        }
        if (player.isInfected && !player.isDead) {
          infectBtn.disabled = true;
        }
        if (player.isDead) {
          killBtn.disabled = true;
          infectBtn.disabled = true;
          if (convertBtn) convertBtn.disabled = true;
          messageBtn.disabled = true;
        }

        playerContainer.appendChild(card);
      });
    }

    async function fetchPlayers() {
      console.log('🔄 جلب اللاعبين للغرفة:', roomCode);
      const data = await getPlayers(roomCode);
      console.log('👥 اللاعبين:', data);
      renderPlayers(data);
    }

    listenToPlayers(roomCode, (data) => {
      renderPlayers(data);
    });

    listenToMessages(roomCode);

    refreshBtn.addEventListener("click", fetchPlayers);
    setInterval(fetchPlayers, 5000);
    await fetchPlayers();

    closeMessageModal.addEventListener('click', () => {
      messageModal.style.display = 'none';
    });

    window.addEventListener('click', (e) => {
      if (e.target === messageModal) messageModal.style.display = 'none';
    });

    sendMessageBtn.addEventListener('click', async () => {
      const playerId = targetPlayerId.value;
      const message = messageInput.value.trim();
      if (!message) {
        modalStatus.textContent = '⚠️ الرجاء كتابة رسالة!';
        modalStatus.style.color = '#e74c3c';
        return;
      }
      if (!playerId) {
        modalStatus.textContent = '❌ لم يتم تحديد لاعب!';
        modalStatus.style.color = '#e74c3c';
        return;
      }

      try {
        const player = await getPlayer(roomCode, playerId);
        const playerName = player?.name || 'لاعب مجهول';
        const messagesRef = ref(db, `rooms/${roomCode}/messages`);
        await push(messagesRef, {
          playerId: playerId,
          playerName: playerName,
          message: message,
          timestamp: Date.now(),
          fromNarrator: true
        });
        modalStatus.textContent = '✅ تم إرسال الرسالة!';
        modalStatus.style.color = '#2ecc71';
        messageInput.value = '';
        setTimeout(() => {
          modalStatus.textContent = '';
          messageModal.style.display = 'none';
        }, 1500);
      } catch (err) {
        modalStatus.textContent = '❌ خطأ: ' + err.message;
        modalStatus.style.color = '#e74c3c';
      }
    });

    document.getElementById("exitBtn").addEventListener("click", async () => {
      if (!confirm(t('confirmEndRound'))) return;
      try {
        await deleteRoom(roomCode);
      } catch (err) {
        console.error(err);
        alert("⚠️ " + t('errorOccurred'));
      }
      clearRoomCode();
      window.location.href = "index.html";
    });

    console.log('🚀 تم تحميل صفحة تحكم الراوي للغرفة:', roomCode);
  </script>
</body>
</html>
